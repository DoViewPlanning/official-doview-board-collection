inal":"Final Outcomes reflect the Office’s published performance framework: trust and confidence, a high-performing public sector, and an accountable public sector. These outcomes are influenced by many actors beyond the Auditor-General.","p1":"Models the institutional safeguards and statutory powers that make independent assurance credible. Sources: https://www.legislation.govt.nz/act/public/2001/0010/latest/DLM88598.html and https://oag.parliament.nz/about-us/what-we-do","p2":"Models the mandatory annual-audit pathway from portfolio allocation to usable accountability information. Source: https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-3","p3":"Models the capacity, quality and timeliness conditions needed for a sustainable public audit system. Sources: https://oag.parliament.nz/about-us/our-structure/audit-quality and https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-3","p4":"Models appropriation assurance from legal authority and Treasury data through checking, correction and escalation. Sources: https://oag.parliament.nz/about-us/what-we-do/controller-function and https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-2","p5":"Combines the shared investigation-to-influence pathway for performance audits and inquiries while retaining their different mandates. Sources: https://oag.parliament.nz/about-us/what-we-do/performance-audits, https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-4 and https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-5","p6":"Models how assurance intelligence becomes parliamentary advice, public information and earlier entity action. Sources: https://oag.parliament.nz/about-us/what-we-do/committee-advice and https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-1","p7":"Models internal stewardship conditions that protect independence, delivery resilience and reputation. Sources: https://oag.parliament.nz/2025/annual-plan, https://oag.parliament.nz/2025/annual-plan/strategic-priority-3.htm and https://oag.parliament.nz/about-us/our-structure/corporate-services-team","p8":"Level 1 contains workstreams and services. Vertical Links identify every direct and material contribution found in the source-side and reverse target-side review.","p9":"Level 2 contains teams and delivery functions drawn from published structures. Source: https://oag.parliament.nz/about-us/our-structure. Links show contribution, not exclusive ownership or reporting lines.","p10":"This no-level page contains cross-cutting competencies. Its Cross-Links are intentionally uneven and show where a capability directly affects a This–Then result or a numbered How Box.","p11":"Scope, sources, assumptions and limitations for this AI-assisted proof of concept.","p12":"Method and cautions for interpreting the many-to-many alignment mapping.","p13":"An illustrative measurement and evaluation plan using live clones of selected board objects."},"docContent":{"p11":"\u003Ch2\u003EPurpose and scope\u003C/h2\u003E\u003Cp\u003EThis proof-of-concept board models how the Office of the Auditor-General | Te Mana Arotake, Audit New Zealand | Mana Arotake Aotearoa, and appointed audit service providers contribute to independent public-sector assurance, accountability and performance improvement. \u003Cb\u003EIt is a proof of concept only and has not been prepared or endorsed in any way by the Office.\u003C/b\u003E\u003C/p\u003E\u003Ch2\u003ESource basis\u003C/h2\u003E\u003Cp\u003EThe model uses public information current to 20 July 2026, including the Public Audit Act 2001, the Office’s role and structure pages, Annual plan 2025/26 (including the March 2026 update), Annual report 2024/25 service results, and Audit New Zealand’s published description. Key URLs are in the board Sources registry and page information.\u003C/p\u003E\u003Ch2\u003EInterpretation\u003C/h2\u003E\u003Cp\u003EThis is a theory-of-change and alignment model, not an organisational chart, legal opinion, audit plan, workforce model, budget allocation, or statement of official ownership. The 2025/26 work programme was in transition: the Office said in March 2026 that strategic intentions for 2026–2031 would be published in April 2026. This board does not assume the status of material not located in the supplied research session.\u003C/p\u003E\u003Ch2\u003EHuman review\u003C/h2\u003E\u003Cp\u003EReview is required by the Office, Audit New Zealand, appointed audit providers, Parliament-facing users, public entities, Māori stakeholders, and people with statutory, audit-quality, data, evaluation and organisational-design expertise before operational or public use.\u003C/p\u003E","p12":"\u003Ch2\u003EMapping method\u003C/h2\u003E\u003Cp\u003EEvery Level 1 workstream was compared with every This–Then box, then every This–Then target was reverse-checked against all Level 1 sources. Every Level 2 function was compared with every Level 1 workstream and the target-side review was repeated. Every competency was compared with This–Then, Level 1 and Level 2 candidates. Only direct, material and defensible links were retained.\u003C/p\u003E\u003Ch2\u003EMajor concentrations\u003C/h2\u003E\u003Cp\u003EAnnual audits concentrate on the annual-assurance and Controller pathways. Standards and quality assurance concentrate on audit evidence, quality and system sustainability. Organisational stewardship spans the audit system and internal capability page. Sector engagement, communication, data, ethical judgement, and professional learning are deliberately cross-cutting.\u003C/p\u003E\u003Ch2\u003ESparse or unmapped areas\u003C/h2\u003E\u003Cp\u003ESome constitutional and ultimate-outcome boxes receive fewer direct workstream links because they are produced through intermediate safeguards, reporting and accountability effects. No Level 1 or Level 2 source was left without an applicable-layer relationship. This does not prove that all real contributors have been identified.\u003C/p\u003E\u003Ch2\u003EPotential gaps and overlap\u003C/h2\u003E\u003Cp\u003EPublic information does not fully specify internal responsibility sharing, staffing, effort, expenditure, or all cross-business delivery arrangements. Boundaries overlap among annual audits, sector engagement, parliamentary advice, research, performance audit, inquiry work and public reporting. Te ao Māori capability is shown both as a work programme and as a cross-cutting competency because the published Kia Tika description includes both organisational initiatives and capability/process changes.\u003C/p\u003E\u003Ch2\u003EMappings needing review\u003C/h2\u003E\u003Cp\u003EDirect Level 2-to-This–Then Cross-Links require particular subject-matter review: they show functions that appear to deliver a result themselves, while Level 2-to-Level 1 links show their broader organisational contribution. Competency links are analytical hypotheses based on the published work and should be tested with role holders, Māori advisers and affected stakeholders.\u003C/p\u003E\u003Ch2\u003ECritical caution\u003C/h2\u003E\u003Cp\u003ELink counts are indicators for analysis. They do not prove staffing, expenditure, accountability, ownership, effort, causal strength, organisational performance, hierarchy, priority, or resource need. The mapping requires review by appropriate domain experts, organisational representatives and affected stakeholders.\u003C/p\u003E","p13":"\u003Ch2\u003EPurpose\u003C/h2\u003E\u003Cp\u003EThis illustrative plan shows a small set of measures and evaluation questions attached to relevant boxes. It is not an approved performance framework. \u003Cb\u003EThis page is just to demonstrate how 'clones' of elements in a DoView Board can be included in any documentation on a Documentation page within a DoView Board.\u003C/b\u003E\u003C/p\u003E\u003Ch3\u003ESelected pathway\u003C/h3\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"page_title\" data-clone-key=\"p2\"\u003E\u003C/div\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"box_title\" data-clone-key=\"p2-c3-b0\"\u003E\u003C/div\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"link\" data-clone-key=\"ttl_16\"\u003E\u003C/div\u003E\u003Ch3\u003EDelivery and quality measures\u003C/h3\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"measure\" data-clone-key=\"M001\"\u003E\u003C/div\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"measure\" data-clone-key=\"M002\"\u003E\u003C/div\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"measure\" data-clone-key=\"M003\"\u003E\u003C/div\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"measure\" data-clone-key=\"M004\"\u003E\u003C/div\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"measure\" data-clone-key=\"M005\"\u003E\u003C/div\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"measure\" data-clone-key=\"M008\"\u003E\u003C/div\u003E\u003Ch3\u003ELearning questions\u003C/h3\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"eval_question\" data-clone-key=\"EQ001\"\u003E\u003C/div\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"eval_question\" data-clone-key=\"EQ002\"\u003E\u003C/div\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"eval_question\" data-clone-key=\"EQ004\"\u003E\u003C/div\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"eval_question\" data-clone-key=\"EQ005\"\u003E\u003C/div\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"eval_question\" data-clone-key=\"EQ006\"\u003E\u003C/div\u003E\u003Cdiv class=\"doc-clone\" data-clone-type=\"eval_question\" data-clone-key=\"EQ007\"\u003E\u003C/div\u003E\u003Ch2\u003ESuggested review rhythm\u003C/h2\u003E\u003Cp\u003EReview service measures quarterly where data are available; review quality, stakeholder and recommendation-follow-up evidence at least annually; and conduct a fuller causal and equity review when strategic intentions or the public-audit delivery model change.\u003C/p\u003E\u003Ch2\u003EInterpretive cautions\u003C/h2\u003E\u003Cp\u003EDo not infer contribution from trend alone. Disaggregate results by entity class, provider type and relevant communities. Combine administrative data, file review, stakeholder feedback and qualitative case evidence. Protect independence by keeping evaluation of the Office distinct from management influence over audit judgements.\u003C/p\u003E","p14":"\u003Ch1\u003EUsing DoView Boards and Disclaimer\u003C/h1\u003E\n\u003Cp\u003ESee the disclaimer section below.\u003C/p\u003E\n\u003Cp\u003EThe DoView Board prompt and the DoView Board built within this DoView Board prototype app are provided free of charge so that anyone can experiment with DoView Boards and explore for themselves how they can answer the 20 key questions that anyone running or overseeing an organization needs to answer. See \u003Ca href=\"https://doviewplanning.org/doviewboardsuse\" target=\"_blank\" rel=\"noopener noreferrer\"\u003Ehttps://doviewplanning.org/doviewboardsuse\u003C/a\u003E.\u003C/p\u003E\n\u003Ch2\u003EWalk-Through\u003C/h2\u003E\n\u003Cp\u003ETo get a walk-through for using DoView Boards, see \u003Ca href=\"https://doviewplanning.org/walkthrough\" target=\"_blank\" rel=\"noopener noreferrer\"\u003Ehttps://doviewplanning.org/walkthrough\u003C/a\u003E.\u003C/p\u003E\n\u003Ch2\u003EAccessing Consulting or Training\u003C/h2\u003E\n\u003Cp\u003EWe can provide consulting or training on integrating the use of DoView Boards into your existing planning, implementation and reporting workflows in business, government, or nonprofit settings. See \u003Ca href=\"https://doviewplanning.org/offerings\" target=\"_blank\" rel=\"noopener noreferrer\"\u003Ehttps://doviewplanning.org/offerings\u003C/a\u003E.\u003C/p\u003E\n\u003Ch2\u003EAdapting the DoView Board Prototype App to your setting\u003C/h2\u003E\n\u003Cp\u003EThis DoView Board is being used within the DoView Board prototype app. It is a free of charge app that runs inside any browser window and can be used for piloting, testing, proof-of-concept and for use where confidential information is not being included and where there is a low security risk.\u003C/p\u003E\n\u003Cp\u003EThe DoView Board app is an open-source developer project under an Apache-2.0 open-source license. See \u003Ca href=\"https://github.com/doviewplanning/official-doview-boards\" target=\"_blank\" rel=\"noopener noreferrer\"\u003Ehttps://github.com/doviewplanning/official-doview-boards\u003C/a\u003E. The wider DoView Planning methodology and DoView® trademarks are governed separately. See \u003Ca href=\"https://doviewplanning.org/trademarkuse\" target=\"_blank\" rel=\"noopener noreferrer\"\u003Ehttps://doviewplanning.org/trademarkuse\u003C/a\u003E.\u003C/p\u003E\n\u003Cp\u003EBecause it is an open-source project, any developer can extend, harden, adapt, or include features of the DoView Board app in other planning products or systems to suit specific deployment requirements. For example, adding enhanced stability, scalability, security, authentication, data handling, or integration features needed for production use, sensitive content, or higher-security environments. If you are looking to deploy DoView Boards in a live operational setting, you can work with any developer to tailor the app to your needs. You can also get in touch with us for advice and methodological input into the best way for you to adapt and extend your use of DoView Boards in your particular setting. \u003Ca href=\"https://doviewplanning.org/contact\" target=\"_blank\" rel=\"noopener noreferrer\"\u003Ehttps://doviewplanning.org/contact\u003C/a\u003E.\u003C/p\u003E\n\u003Ch2\u003EDisclaimer\u003C/h2\u003E\n\u003Cp\u003EDoView Boards are provided for planning and illustrative purposes only. The content of any DoView Board does not constitute professional advice of any kind, including but not limited to legal, financial, medical, strategic, or organizational advice. No warranty is given as to the accuracy, completeness, or fitness for purpose of any content. The usual precautions for AI-generated material need to be taken. Dr Paul Duignan, DoViewPlanning.org, The Ideas Web Ltd, DoView Corporation Ltd and any associated parties accept no liability whatsoever for any loss, damage, or adverse outcome arising directly or indirectly from the use of, or reliance on, any DoView Board or its contents. Use entirely at your own risk.\u003C/p\u003E\n\u003Cp\u003EPlease note that this DoView Board is in an interactive HTML file and contains active JavaScript so the board can work. Only open boards from sources you trust. Read-only copies disable editing through the board interface but are not security protection.\u003C/p\u003E"},"createdDate":"2026-07-20","boardInstanceId":"office_of_the_auditor_general_nz_20260720_152500_1784521066013_dvypqs","boardUid":"board_4f382479-7764-4ba5-b7a5-17d04636a5f0","ttLinks":[{"id":"ttl_1","from":"p1-c0-b0","to":"p1-c1-b1","polarity":"positive","light":"","mainText":"“Officer of Parliament status secured” makes “Audit scope set independently” more likely because reporting to Parliament rather than government protects control over the audit scope. Source: https://www.legislation.govt.nz/act/public/2001/0010/latest/DLM88598.html","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_5c62c680-e963-404a-ac1d-3a2ea2b9dfaf"},{"id":"ttl_2","from":"p1-c0-b0","to":"p1-c1-b0","polarity":"positive","light":"","mainText":"Officer of Parliament status creates an institutional basis for identifying and managing external influence; this turns “Officer of Parliament status secured” into a direct basis for “Conflicts and threats managed”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_32ab765e-a638-4deb-a3a8-49bcc0062b8c"},{"id":"ttl_3","from":"p1-c0-b1","to":"p1-c1-b0","polarity":"positive","light":"","mainText":"When “Independent appointment and tenure protected” is in place, secure appointment and tenure reduce personal or political leverage over audit judgements, which strengthens “Conflicts and threats managed”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_7b44cb57-7a51-47ec-b1b2-8c2a512e6457"},{"id":"ttl_4","from":"p1-c0-b1","to":"p1-c1-b1","polarity":"positive","light":"","mainText":"“Audit scope set independently” depends in part on “Independent appointment and tenure protected”: protected tenure allows the audit programme and scope to be set without short-term political pressure.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_a6462fe2-7682-434b-9133-888e2b17eb90"},{"id":"ttl_5","from":"p1-c0-b2","to":"p1-c1-b1","polarity":"positive","light":"","mainText":"The move from “Statutory audit mandate clear” to “Audit scope set independently” is material because clear statutory functions define what may be audited and reported.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_d17080cb-7f59-4e16-9da2-d3b61cae208f"},{"id":"ttl_6","from":"p1-c0-b2","to":"p1-c1-b2","polarity":"positive","light":"","mainText":"“Statutory audit mandate clear” makes “Evidence obtained without obstruction” more likely because the statutory mandate activates the powers needed to obtain audit evidence.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_6a5ccd60-68c6-4b35-9ffc-ed74bddc0061"},{"id":"ttl_7","from":"p1-c0-b3","to":"p1-c1-b2","polarity":"positive","light":"","mainText":"access, examination and premises powers reduce the risk that material evidence is withheld; this turns “Information-gathering powers available” into a direct basis for “Evidence obtained without obstruction”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_1b9effb1-08dd-4bc6-bddd-2af0d5e9ae06"},{"id":"ttl_8","from":"p1-c0-b3","to":"p1-c1-b1","polarity":"positive","light":"","mainText":"When “Information-gathering powers available” is in place, usable information-gathering powers make an independently chosen scope operationally effective, which strengthens “Audit scope set independently”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_284a090a-6ded-45e8-89b4-5e8aa46dfe81"},{"id":"ttl_9","from":"p1-c1-b0","to":"p1-c2-b0","polarity":"positive","light":"","mainText":"“Findings formed without political direction” depends in part on “Conflicts and threats managed”: managed conflicts keep professional conclusions free from interests that could distort them.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_c7b677ff-b736-41fb-bbb8-7610c68f61b2"},{"id":"ttl_10","from":"p1-c1-b1","to":"p1-c2-b0","polarity":"positive","light":"","mainText":"The move from “Audit scope set independently” to “Findings formed without political direction” is material because independent scope-setting allows findings to follow evidence rather than a political brief.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_5eb2ff4d-d8d2-44b3-ae2f-cf0947230d1b"},{"id":"ttl_11","from":"p1-c1-b1","to":"p1-c2-b1","polarity":"positive","light":"","mainText":"“Audit scope set independently” makes “Reports issued to appropriate audiences” more likely because control over scope lets the Auditor-General decide what matters should be reported and to whom.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_a2a35e9d-7200-4704-b040-b5d2dd05c4fd"},{"id":"ttl_12","from":"p1-c1-b2","to":"p1-c2-b0","polarity":"positive","light":"","mainText":"unobstructed evidence supports defensible conclusions; this turns “Evidence obtained without obstruction” into a direct basis for “Findings formed without political direction”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_4e4869e2-97b7-46d2-a477-4e99dde5df1b"},{"id":"ttl_13","from":"p1-c1-b2","to":"p1-c2-b1","polarity":"positive","light":"","mainText":"When “Evidence obtained without obstruction” is in place, complete evidence supports accurate and fair public reporting, which strengthens “Reports issued to appropriate audiences”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_202e5073-72cd-49d7-9e6a-27a451d095fb"},{"id":"ttl_14","from":"p1-c2-b0","to":"p1-c3-b0","polarity":"positive","light":"","mainText":"“Independent public assurance sustained” depends in part on “Findings formed without political direction”: users can rely on assurance only when conclusions are visibly insulated from political direction.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_dcadf57c-1b79-4de6-a99f-4770c266adcf"},{"id":"ttl_15","from":"p1-c2-b1","to":"p1-c3-b0","polarity":"positive","light":"","mainText":"The move from “Reports issued to appropriate audiences” to “Independent public assurance sustained” is material because reporting to Parliament, entities and the public converts independent work into usable assurance.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_12bb0254-a6cf-46a5-b367-21f1d238d270"},{"id":"ttl_16","from":"p2-c0-b0","to":"p2-c1-b0","polarity":"positive","light":"","mainText":"“Public entity coverage confirmed” makes “Entity risks understood” more likely because complete portfolio coverage gives auditors the population and entity context needed for risk assessment. Source: https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-3","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_c04c1030-ca77-4076-9a47-4ef9201ae802"},{"id":"ttl_17","from":"p2-c0-b0","to":"p2-c1-b3","polarity":"positive","light":"","mainText":"knowing every required audit lets the Office sequence statutory deadlines across the portfolio; this turns “Public entity coverage confirmed” into a direct basis for “Audit timetables agreed”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_d4917f96-aa85-4199-9b41-be8211629db1"},{"id":"ttl_18","from":"p2-c0-b1","to":"p2-c1-b0","polarity":"positive","light":"","mainText":"When “Auditor capacity matched to portfolios” is in place, matching capacity and sector experience improves the quality of entity risk understanding, which strengthens “Entity risks understood”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_effc23aa-3ef0-469f-90b3-cc52d236e39a"},{"id":"ttl_19","from":"p2-c0-b1","to":"p2-c1-b3","polarity":"positive","light":"","mainText":"“Audit timetables agreed” depends in part on “Auditor capacity matched to portfolios”: realistic portfolio allocation makes agreed audit dates achievable.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_ae38bc8c-cf1e-4398-835f-e0e2b9c08fba"},{"id":"ttl_20","from":"p2-c0-b2","to":"p2-c1-b1","polarity":"positive","light":"","mainText":"The move from “Independence risks cleared” to “Materiality and scope set” is material because cleared independence risks allow materiality and scope decisions to be trusted.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_74204b63-b07d-47b4-93d0-7f90767ba8c0"},{"id":"ttl_21","from":"p2-c0-b2","to":"p2-c1-b0","polarity":"positive","light":"","mainText":"“Independence risks cleared” makes “Entity risks understood” more likely because independence clearance prevents relationship conflicts from distorting risk assessment.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_093ccc0e-27e6-44f2-b778-239bb06853dd"},{"id":"ttl_22","from":"p2-c1-b0","to":"p2-c2-b0","polarity":"positive","light":"","mainText":"entity financial risks determine which balances, transactions and disclosures need testing; this turns “Entity risks understood” into a direct basis for “Financial evidence tested”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_1e191cdb-1b4d-4104-b408-961d7e04ae4d"},{"id":"ttl_23","from":"p2-c1-b0","to":"p2-c2-b2","polarity":"positive","light":"","mainText":"When “Entity risks understood” is in place, risk assessment directs attention to governance and control weaknesses, which strengthens “Controls and governance examined”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_2a076100-b5ba-4863-8d69-933ae0190067"},{"id":"ttl_24","from":"p2-c1-b1","to":"p2-c2-b0","polarity":"positive","light":"","mainText":"“Financial evidence tested” depends in part on “Materiality and scope set”: materiality determines the nature and extent of financial audit evidence.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_2aa0d67a-c3bc-4e9a-a041-c168ba9c7237"},{"id":"ttl_25","from":"p2-c1-b1","to":"p2-c2-b3","polarity":"positive","light":"","mainText":"The move from “Materiality and scope set” to “Misstatements and risks resolved” is material because a clear scope gives auditors a basis for resolving material errors and risks.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_f3e0499d-0c98-4ab1-8c89-233f7066d435"},{"id":"ttl_26","from":"p2-c1-b2","to":"p2-c2-b1","polarity":"positive","light":"","mainText":"“Performance information assessed” makes “Service performance evidence tested” more likely because assessing the performance-reporting framework focuses testing on service results and measures.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_c957eb9e-c320-4dcc-893f-335aa2a599e8"},{"id":"ttl_27","from":"p2-c1-b2","to":"p2-c2-b2","polarity":"positive","light":"","mainText":"performance reporting depends on controls, governance and data processes that auditors examine; this turns “Performance information assessed” into a direct basis for “Controls and governance examined”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_52507558-2134-42b8-bd06-dbbb401232e6"},{"id":"ttl_28","from":"p2-c1-b3","to":"p2-c2-b3","polarity":"positive","light":"","mainText":"When “Audit timetables agreed” is in place, agreed timetables create time for issues to be resolved before reporting deadlines, which strengthens “Misstatements and risks resolved”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_e9ce26b5-13ba-458c-841d-6c6bda7b76e6"},{"id":"ttl_29","from":"p2-c1-b3","to":"p2-c2-b4","polarity":"positive","light":"","mainText":"“Audit quality reviewed” depends in part on “Audit timetables agreed”: planned milestones allow quality review before opinions are signed.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_b35bed64-e282-4404-b642-2e9510dd4ced"},{"id":"ttl_30","from":"p2-c2-b0","to":"p2-c3-b0","polarity":"positive","light":"","mainText":"The move from “Financial evidence tested” to “Audit opinions issued” is material because sufficient financial evidence is the primary basis for the financial audit opinion.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_aeff22f3-6a5c-4401-9c38-98f324646109"},{"id":"ttl_31","from":"p2-c2-b1","to":"p2-c3-b0","polarity":"positive","light":"","mainText":"“Service performance evidence tested” makes “Audit opinions issued” more likely because tested service-performance evidence supports the opinion on performance information.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_bbc437b7-f63f-4daa-a04e-6756096e3196"},{"id":"ttl_32","from":"p2-c2-b2","to":"p2-c3-b1","polarity":"positive","light":"","mainText":"control and governance observations become practical messages for governors; this turns “Controls and governance examined” into a direct basis for “Governors receive management reports”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_118db01e-9b95-4756-a9a1-41d6d950e141"},{"id":"ttl_33","from":"p2-c2-b3","to":"p2-c3-b0","polarity":"positive","light":"","mainText":"When “Misstatements and risks resolved” is in place, resolved material issues allow the appointed auditor to form a defensible opinion, which strengthens “Audit opinions issued”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_a2303ded-503e-4349-a7ff-19879f2e1108"},{"id":"ttl_34","from":"p2-c2-b3","to":"p2-c3-b1","polarity":"positive","light":"","mainText":"“Governors receive management reports” depends in part on “Misstatements and risks resolved”: unresolved and corrected issues inform the management report to governors.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_a17d3b6c-5734-479b-8e15-924e16fec403"},{"id":"ttl_35","from":"p2-c2-b4","to":"p2-c3-b0","polarity":"positive","light":"","mainText":"The move from “Audit quality reviewed” to “Audit opinions issued” is material because quality review challenges whether the file supports the proposed opinion.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_f000a076-3698-459c-971a-01e7f6c7be22"},{"id":"ttl_36","from":"p2-c2-b4","to":"p2-c3-b2","polarity":"positive","light":"","mainText":"“Audit quality reviewed” makes “Ministerial findings communicated” more likely because quality oversight supports reliable sector-level communication of significant findings.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_00afed9c-e09e-4182-8c09-3b9291bfee40"},{"id":"ttl_37","from":"p2-c3-b0","to":"p2-c4-b0","polarity":"positive","light":"","mainText":"published opinions signal whether reported information can be relied on; this turns “Audit opinions issued” into a direct basis for “Reporting reliability made visible”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_1a10d569-171c-472a-8bf7-5f1dcbb38424"},{"id":"ttl_38","from":"p2-c3-b0","to":"p2-c4-b1","polarity":"positive","light":"","mainText":"When “Audit opinions issued” is in place, modified opinions and emphasis paragraphs make significant audit matters visible, which strengthens “Audit matters disclosed promptly”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_08885d21-56bc-46bf-80c8-a60aeefb2b1c"},{"id":"ttl_39","from":"p2-c3-b1","to":"p2-c4-b1","polarity":"positive","light":"","mainText":"“Audit matters disclosed promptly” depends in part on “Governors receive management reports”: management reports disclose control, governance and reporting issues to those charged with governance.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_8ea32394-6d2b-454e-a254-3b27d22c866f"},{"id":"ttl_40","from":"p2-c3-b2","to":"p2-c4-b1","polarity":"positive","light":"","mainText":"The move from “Ministerial findings communicated” to “Audit matters disclosed promptly” is material because ministerial letters surface important audit findings to political overseers.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_b9090226-0836-43d9-9063-407931ad5e20"},{"id":"ttl_41","from":"p2-c3-b2","to":"p2-c4-b0","polarity":"positive","light":"","mainText":"“Ministerial findings communicated” makes “Reporting reliability made visible” more likely because sector findings help Parliament interpret the reliability of entity reporting.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_4cdeb83b-e64b-42f4-9349-5205583b3bfd"},{"id":"ttl_42","from":"p2-c4-b0","to":"p2-c5-b0","polarity":"positive","light":"","mainText":"reliable audited reporting gives users a sound basis for holding entities to account; this turns “Reporting reliability made visible” into a direct basis for “Public organisations held accountable”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_2420b943-5321-443f-ad30-364c4b405103"},{"id":"ttl_43","from":"p2-c4-b0","to":"p2-c5-b1","polarity":"positive","light":"","mainText":"When “Reporting reliability made visible” is in place, clear reliability signals help Parliament and the public use reported results confidently, which strengthens “Parliament and public better informed”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_48785d39-50e2-4f64-af50-f3163c09ebd1"},{"id":"ttl_44","from":"p2-c4-b1","to":"p2-c5-b0","polarity":"positive","light":"","mainText":"“Public organisations held accountable” depends in part on “Audit matters disclosed promptly”: prompt disclosure allows governors and overseers to require corrective action.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_e7499423-ac8f-4b76-80bb-f03580bb109b"},{"id":"ttl_45","from":"p2-c4-b1","to":"p2-c5-b1","polarity":"positive","light":"","mainText":"The move from “Audit matters disclosed promptly” to “Parliament and public better informed” is material because visible audit matters improve public and parliamentary understanding of performance and risk.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_ddc4080d-e1a6-419e-883c-a6f6c757a86f"},{"id":"ttl_46","from":"p3-c0-b0","to":"p3-c1-b0","polarity":"positive","light":"","mainText":"“Portfolio demand forecast” makes “Auditors appointed to fit” more likely because forecast demand allows auditor portfolios to be assigned before capacity becomes a delivery constraint. Source: https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-3","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_aa7ddb8a-02a4-44d1-b88d-0a01f4c4f1bd"},{"id":"ttl_47","from":"p3-c0-b0","to":"p3-c1-b1","polarity":"positive","light":"","mainText":"demand forecasts inform fee and resourcing settings needed for a viable audit portfolio; this turns “Portfolio demand forecast” into a direct basis for “Fees support viable delivery”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_c1b85ee6-de44-4f20-b632-534ef60f05a6"},{"id":"ttl_48","from":"p3-c0-b1","to":"p3-c1-b0","polarity":"positive","light":"","mainText":"When “Audit capability gaps identified” is in place, identified gaps support appointments that match sector skill and available capacity, which strengthens “Auditors appointed to fit”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_ca0d5924-cf82-45d7-a334-e601801723b7"},{"id":"ttl_49","from":"p3-c0-b1","to":"p3-c1-b3","polarity":"positive","light":"","mainText":"“Training targets common weaknesses” depends in part on “Audit capability gaps identified”: capability evidence directs training toward the weaknesses most likely to affect quality.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_8cf4609b-328c-42d7-b456-e19e1a6d7e65"},{"id":"ttl_50","from":"p3-c0-b2","to":"p3-c1-b1","polarity":"positive","light":"","mainText":"The move from “Small-entity arrears quantified” to “Fees support viable delivery” is material because arrears data reveals where fee, capacity or scope settings are not sustaining timely delivery.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_7be5d115-3f70-4bd9-b1e6-e0501a5deee3"},{"id":"ttl_51","from":"p3-c0-b2","to":"p3-c1-b4","polarity":"positive","light":"","mainText":"“Small-entity arrears quantified” makes “Technology supports consistent audits” more likely because portfolio bottlenecks provide a concrete case for workflow and audit-management technology.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_f40de8d7-8bd0-4bce-bd0f-afd6a7ae6056"},{"id":"ttl_52","from":"p3-c0-b3","to":"p3-c1-b2","polarity":"positive","light":"","mainText":"early scanning lets standards and guidance be updated before new requirements take effect; this turns “Emerging standards anticipated” into a direct basis for “Standards and guidance updated”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_3ee1eebd-25f1-4cf1-bf9e-b2a873e031c2"},{"id":"ttl_53","from":"p3-c0-b3","to":"p3-c1-b3","polarity":"positive","light":"","mainText":"When “Emerging standards anticipated” is in place, anticipated standards changes shape professional learning before audits are performed, which strengthens “Training targets common weaknesses”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_47d7ea32-877d-450d-bf50-ae71b4166d37"},{"id":"ttl_54","from":"p3-c1-b0","to":"p3-c2-b1","polarity":"positive","light":"","mainText":"“Appointed auditors remain competent” depends in part on “Auditors appointed to fit”: fit-for-purpose appointments place competent signatories and teams on the relevant audits.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_28df83e2-1f13-4b99-9c5f-68d20cc24a6e"},{"id":"ttl_55","from":"p3-c1-b0","to":"p3-c2-b2","polarity":"positive","light":"","mainText":"The move from “Auditors appointed to fit” to “Portfolio capacity remains sustainable” is material because balanced allocations distribute work across providers rather than exhausting one part of the system.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_50566e8d-e91d-49fa-8588-1b6bc957b95b"},{"id":"ttl_56","from":"p3-c1-b1","to":"p3-c2-b2","polarity":"positive","light":"","mainText":"“Fees support viable delivery” makes “Portfolio capacity remains sustainable” more likely because viable fees support the staff time and provider capacity needed to complete audits.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_461335a3-c08c-4afd-a5b4-f0d3c2199f07"},{"id":"ttl_57","from":"p3-c1-b2","to":"p3-c2-b0","polarity":"positive","light":"","mainText":"current standards and guidance define the quality expectations applied in file review; this turns “Standards and guidance updated” into a direct basis for “Audit files meet quality expectations”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_72cdf870-a462-4699-8427-6a5c3f7fe9f5"},{"id":"ttl_58","from":"p3-c1-b2","to":"p3-c2-b1","polarity":"positive","light":"","mainText":"When “Standards and guidance updated” is in place, technical guidance helps appointed auditors apply public-sector requirements consistently, which strengthens “Appointed auditors remain competent”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_30c7fa9b-db3f-4491-aec1-5e3919347ede"},{"id":"ttl_59","from":"p3-c1-b3","to":"p3-c2-b0","polarity":"positive","light":"","mainText":"“Audit files meet quality expectations” depends in part on “Training targets common weaknesses”: targeted learning corrects recurring deficiencies found in reviewed audit files.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_84383c7b-2828-4a3d-8704-0ec97c74082d"},{"id":"ttl_60","from":"p3-c1-b3","to":"p3-c2-b1","polarity":"positive","light":"","mainText":"The move from “Training targets common weaknesses” to “Appointed auditors remain competent” is material because professional learning maintains competence as audit requirements change.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_290917a2-7c15-4a21-8bcf-8ee5c58d9901"},{"id":"ttl_61","from":"p3-c1-b4","to":"p3-c2-b0","polarity":"positive","light":"","mainText":"“Technology supports consistent audits” makes “Audit files meet quality expectations” more likely because consistent audit systems support complete documentation and review trails.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_163762a9-515a-4913-9b49-a5d6f4412a46"},{"id":"ttl_62","from":"p3-c1-b4","to":"p3-c2-b2","polarity":"positive","light":"","mainText":"shared technology reduces avoidable workflow friction across the portfolio; this turns “Technology supports consistent audits” into a direct basis for “Portfolio capacity remains sustainable”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_6075ef27-72db-44a9-b140-311764751a11"},{"id":"ttl_63","from":"p3-c2-b0","to":"p3-c3-b1","polarity":"positive","light":"","mainText":"When “Audit files meet quality expectations” is in place, sound files support useful, defensible audit service for public entities, which strengthens “Audit service valued by entities”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_5831a4d7-471b-4f97-9c8b-c3f4e8def430"},{"id":"ttl_64","from":"p3-c2-b1","to":"p3-c3-b1","polarity":"positive","light":"","mainText":"“Audit service valued by entities” depends in part on “Appointed auditors remain competent”: competent auditors communicate issues and complete work more effectively.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_0856ccec-a6bf-4b08-9978-c26ff1223b0a"},{"id":"ttl_65","from":"p3-c2-b2","to":"p3-c3-b0","polarity":"positive","light":"","mainText":"The move from “Portfolio capacity remains sustainable” to “Audit arrears reduced” is material because sustainable capacity allows overdue audits to be completed without creating new arrears.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_d96dbe6e-8f22-46cd-9514-55294ceb1111"},{"id":"ttl_66","from":"p3-c3-b0","to":"p3-c4-b0","polarity":"positive","light":"","mainText":"“Audit arrears reduced” makes “Public audit system remains credible” more likely because lower arrears restore the timeliness needed for the audit system to remain credible.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_2059d06c-2a2a-4c25-b627-cf0c90a2c1d0"},{"id":"ttl_67","from":"p3-c3-b1","to":"p3-c4-b0","polarity":"positive","light":"","mainText":"entity confidence in audit service reinforces the legitimacy of the public audit system; this turns “Audit service valued by entities” into a direct basis for “Public audit system remains credible”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_147d889a-c599-4826-80bd-d48befb2bf0b"},{"id":"ttl_68","from":"p4-c0-b0","to":"p4-c1-b0","polarity":"positive","light":"","mainText":"When “Appropriation authorities interpreted” is in place, clear interpretation tells department auditors which amounts and purposes Parliament authorised, which strengthens “Department spending tested during audits”. Source: https://oag.parliament.nz/about-us/what-we-do/controller-function","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_91db4a52-d897-4c9d-91f8-b70cd006a9be"},{"id":"ttl_69","from":"p4-c0-b0","to":"p4-c1-b2","polarity":"positive","light":"","mainText":"“Potential breaches investigated” depends in part on “Appropriation authorities interpreted”: the legal boundaries of each appropriation provide the benchmark for investigating possible breaches.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_267f9583-04d7-4fe2-bd8b-95bf540a2cd1"},{"id":"ttl_70","from":"p4-c0-b1","to":"p4-c1-b1","polarity":"positive","light":"","mainText":"The move from “Treasury expenditure data received” to “Monthly expenditure reviewed” is material because Treasury data supplies the monthly expenditure record that the Controller reviews.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_20bae24c-26af-42af-bb06-fe7c0ae393c6"},{"id":"ttl_71","from":"p4-c0-b1","to":"p4-c1-b2","polarity":"positive","light":"","mainText":"“Treasury expenditure data received” makes “Potential breaches investigated” more likely because detailed expenditure data highlights amounts or activities that may sit outside authority.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_90fbb54d-56fc-4882-b263-35a101b22dca"},{"id":"ttl_72","from":"p4-c1-b0","to":"p4-c2-b0","polarity":"positive","light":"","mainText":"audit testing identifies departmental errors early enough for corrective action; this turns “Department spending tested during audits” into a direct basis for “Departments correct appropriation issues”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_5d976874-3946-4530-9c2f-ff7d23797ec5"},{"id":"ttl_73","from":"p4-c1-b0","to":"p4-c2-b1","polarity":"positive","light":"","mainText":"When “Department spending tested during audits” is in place, serious audit findings can trigger formal reporting or use of Controller powers, which strengthens “Unlawful spending reported or stopped”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_d230c930-0ba0-4327-b4bd-1195239bf539"},{"id":"ttl_74","from":"p4-c1-b1","to":"p4-c2-b0","polarity":"positive","light":"","mainText":"“Departments correct appropriation issues” depends in part on “Monthly expenditure reviewed”: monthly review lets departments address emerging appropriation issues during the year.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_de0155a6-fbab-4e2d-a628-4b47e3484596"},{"id":"ttl_75","from":"p4-c1-b1","to":"p4-c2-b1","polarity":"positive","light":"","mainText":"The move from “Monthly expenditure reviewed” to “Unlawful spending reported or stopped” is material because unresolved concerns identified in monthly reports can be escalated.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_a14569db-1198-4579-8024-671ed29d3ca2"},{"id":"ttl_76","from":"p4-c1-b2","to":"p4-c2-b0","polarity":"positive","light":"","mainText":"“Potential breaches investigated” makes “Departments correct appropriation issues” more likely because investigation distinguishes correctable classification or timing issues from confirmed unlawful spending.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_b6441c52-a4d9-4855-9b23-496a9109b3df"},{"id":"ttl_77","from":"p4-c1-b2","to":"p4-c2-b1","polarity":"positive","light":"","mainText":"substantiated breaches provide the basis for reporting, ministerial direction or stopping funds; this turns “Potential breaches investigated” into a direct basis for “Unlawful spending reported or stopped”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_77d0050f-8268-4633-b415-d7b8bb15c0d0"},{"id":"ttl_78","from":"p4-c2-b0","to":"p4-c3-b0","polarity":"positive","light":"","mainText":"When “Departments correct appropriation issues” is in place, correctly remedied issues bring expenditure back within lawful authority, which strengthens “Public spending remains authorised”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_2a3b35c4-84c8-4274-ab9a-2a90496fa953"},{"id":"ttl_79","from":"p4-c2-b1","to":"p4-c3-b0","polarity":"positive","light":"","mainText":"“Public spending remains authorised” depends in part on “Unlawful spending reported or stopped”: reporting or stopping unlawful expenditure protects the boundary set by appropriations.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_e1afb2a6-7eb1-4388-a024-2152d20789b0"},{"id":"ttl_80","from":"p4-c2-b1","to":"p4-c3-b1","polarity":"positive","light":"","mainText":"The move from “Unlawful spending reported or stopped” to “Parliamentary control of supply upheld” is material because effective escalation preserves Parliament’s ultimate authority over Crown spending.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_c71f2c56-951d-4209-b036-9e5247b2ca89"},{"id":"ttl_81","from":"p5-c0-b0","to":"p5-c1-b0","polarity":"positive","light":"","mainText":"“High-impact topics prioritised” makes “Evidence gathered and tested” more likely because prioritising high-impact topics concentrates evidence work on matters likely to improve public value. Source: https://oag.parliament.nz/about-us/what-we-do/performance-audits","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_e4186892-e5db-47bc-b1be-e8d709690634"},{"id":"ttl_82","from":"p5-c0-b0","to":"p5-c1-b2","polarity":"positive","light":"","mainText":"significant and contested topics warrant independent expert and peer challenge; this turns “High-impact topics prioritised” into a direct basis for “Expert and peer review applied”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_972569c8-be82-46a0-8a8b-eb6bbcef56c5"},{"id":"ttl_83","from":"p5-c0-b1","to":"p5-c1-b0","polarity":"positive","light":"","mainText":"When “Inquiry requests triaged” is in place, triage identifies which inquiry concerns justify statutory evidence gathering, which strengthens “Evidence gathered and tested”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_56e40a7d-c147-4352-ac9b-4b092774096c"},{"id":"ttl_84","from":"p5-c0-b1","to":"p5-c1-b1","polarity":"positive","light":"","mainText":"“Public entity explanations considered” depends in part on “Inquiry requests triaged”: inquiry requests frame which public entity explanations must be heard and tested.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_62d8a16e-6436-4e4c-bfea-0454be0b2b2e"},{"id":"ttl_85","from":"p5-c0-b2","to":"p5-c1-b1","polarity":"positive","light":"","mainText":"The move from “Affected perspectives sought” to “Public entity explanations considered” is material because seeking affected perspectives provides context against which official explanations can be assessed.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_755833e3-08fd-4fda-981b-bd6f2e8e7de3"},{"id":"ttl_86","from":"p5-c0-b2","to":"p5-c1-b0","polarity":"positive","light":"","mainText":"“Affected perspectives sought” makes “Evidence gathered and tested” more likely because community and stakeholder perspectives identify evidence that administrative records may miss.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_cc7113f6-b62d-4acd-ad2e-1c78eba7d78c"},{"id":"ttl_87","from":"p5-c0-b3","to":"p5-c1-b0","polarity":"positive","light":"","mainText":"explicit criteria turn broad audit questions into testable expectations; this turns “Audit criteria established” into a direct basis for “Evidence gathered and tested”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_29fab66d-3e7d-4833-a7b7-f88cceed1d40"},{"id":"ttl_88","from":"p5-c0-b3","to":"p5-c1-b2","polarity":"positive","light":"","mainText":"When “Audit criteria established” is in place, peer review can challenge whether criteria and methods support fair conclusions, which strengthens “Expert and peer review applied”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_e86d1b87-d2c6-4965-8d3e-f96eee74ba92"},{"id":"ttl_89","from":"p5-c0-b4","to":"p5-c1-b1","polarity":"positive","light":"","mainText":"“Public entity explanations considered” depends in part on “Mandate boundaries confirmed”: clear mandate boundaries keep entity engagement focused on matters the Auditor-General may examine.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_0da5c327-adc2-45b6-bb92-f47ac79bed95"},{"id":"ttl_90","from":"p5-c1-b0","to":"p5-c2-b0","polarity":"positive","light":"","mainText":"The move from “Evidence gathered and tested” to “Performance gaps identified” is material because tested evidence shows where performance does not meet agreed criteria.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_2d06b653-fc39-4d86-856e-354f0c88416b"},{"id":"ttl_91","from":"p5-c1-b0","to":"p5-c2-b1","polarity":"positive","light":"","mainText":"“Evidence gathered and tested” makes “Good practice recognised” more likely because evidence also identifies practices that work well and can be shared.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_990074cb-baf1-4e23-87be-a3c3682a0124"},{"id":"ttl_92","from":"p5-c1-b0","to":"p5-c2-b2","polarity":"positive","light":"","mainText":"triangulated evidence helps distinguish root system causes from isolated symptoms; this turns “Evidence gathered and tested” into a direct basis for “System causes understood”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_a88835f6-9f21-48a2-9a13-8a5783b6fcea"},{"id":"ttl_93","from":"p5-c1-b1","to":"p5-c2-b2","polarity":"positive","light":"","mainText":"When “Public entity explanations considered” is in place, entity explanations reveal operational dependencies and constraints behind observed results, which strengthens “System causes understood”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_b00fdd42-39c2-4bf1-b439-eccdcf7e62a1"},{"id":"ttl_94","from":"p5-c1-b1","to":"p5-c2-b3","polarity":"positive","light":"","mainText":"“Recommendations made practicable” depends in part on “Public entity explanations considered”: understanding delivery context makes recommendations feasible rather than abstract.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_16ef20e7-a03f-4f73-a523-e3546dd62efa"},{"id":"ttl_95","from":"p5-c1-b2","to":"p5-c2-b0","polarity":"positive","light":"","mainText":"The move from “Expert and peer review applied” to “Performance gaps identified” is material because expert and peer challenge reduces the risk of overstating a performance gap.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_60ee31f0-8136-4bd8-aa7d-210066e88681"},{"id":"ttl_96","from":"p5-c1-b2","to":"p5-c2-b3","polarity":"positive","light":"","mainText":"“Expert and peer review applied” makes “Recommendations made practicable” more likely because review tests whether recommendations follow logically from evidence and mandate.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_4848ffef-8269-40ea-ad12-975a70df1a79"},{"id":"ttl_97","from":"p5-c2-b0","to":"p5-c3-b0","polarity":"positive","light":"","mainText":"significant performance gaps need formal reporting so Parliament can scrutinise them; this turns “Performance gaps identified” into a direct basis for “Reports presented to Parliament”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_8460e1aa-570b-4bf8-aa84-ee354d53f237"},{"id":"ttl_98","from":"p5-c2-b1","to":"p5-c3-b1","polarity":"positive","light":"","mainText":"When “Good practice recognised” is in place, recognised good practice gives public organisations workable examples to engage with, which strengthens “Public organisations engage with findings”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_cfab4870-a697-47f5-bcdc-5603ca502bee"},{"id":"ttl_99","from":"p5-c2-b2","to":"p5-c3-b0","polarity":"positive","light":"","mainText":"“Reports presented to Parliament” depends in part on “System causes understood”: system-level causes help Parliament see where problems cross agency boundaries.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_c329db88-1b7d-44a0-aaea-4ff87051e577"},{"id":"ttl_100","from":"p5-c2-b2","to":"p5-c3-b1","polarity":"positive","light":"","mainText":"The move from “System causes understood” to “Public organisations engage with findings” is material because causal analysis helps entities focus engagement on the changes most likely to matter.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_0c522bb2-10ef-4cda-8b83-427f9f1db47c"},{"id":"ttl_101","from":"p5-c2-b3","to":"p5-c3-b1","polarity":"positive","light":"","mainText":"“Recommendations made practicable” makes “Public organisations engage with findings” more likely because practicable recommendations give audited organisations a clear basis for response.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_f2c68a1b-2a3e-42bf-8e62-a5891dbc21bc"},{"id":"ttl_102","from":"p5-c2-b3","to":"p5-c3-b2","polarity":"positive","light":"","mainText":"specific recommendations create observable commitments that can be followed up; this turns “Recommendations made practicable” into a direct basis for “Recommendation follow-up completed”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_bddc91c8-fa43-4fb5-a71f-90ecec65bf8f"},{"id":"ttl_103","from":"p5-c3-b0","to":"p5-c4-b1","polarity":"positive","light":"","mainText":"When “Reports presented to Parliament” is in place, public reporting gives an independent account of issues that concern Parliament and New Zealanders, which strengthens “Issues of public interest clarified”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_1dc290e8-b886-4396-80bd-65f7110126fe"},{"id":"ttl_104","from":"p5-c3-b1","to":"p5-c4-b0","polarity":"positive","light":"","mainText":"“Public sector practice improved” depends in part on “Public organisations engage with findings”: engagement turns findings into changes in governance, management and service practice.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_98c8d670-f155-4206-ac2f-8c55d19e8540"},{"id":"ttl_105","from":"p5-c3-b2","to":"p5-c4-b0","polarity":"positive","light":"","mainText":"The move from “Recommendation follow-up completed” to “Public sector practice improved” is material because follow-up keeps recommendations active and reveals whether intended improvements occurred.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_361779e5-31c3-46c1-9665-19e054d84326"},{"id":"ttl_106","from":"p5-c3-b2","to":"p5-c4-b1","polarity":"positive","light":"","mainText":"“Recommendation follow-up completed” makes “Issues of public interest clarified” more likely because follow-up clarifies the continuing significance or resolution of matters initially reported.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_db955127-0496-4331-946b-945a202b1f4c"},{"id":"ttl_107","from":"p6-c0-b0","to":"p6-c1-b0","polarity":"positive","light":"","mainText":"aggregated audit findings give committees evidence across entities and sectors; this turns “Audit findings aggregated” into a direct basis for “Select committees briefed on time”. Source: https://oag.parliament.nz/about-us/what-we-do/committee-advice","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[],"uid":"link_d8e8cf10-61fe-48b9-a67c-c58a5affc0fc"},{"id":"ttl_108","from":"p6-c0-b0","to":"p6-c1-b1","polarity":"positive","light":"","mainText":"When “Audit findings aggregated” is in place, annual audit intelligence identifies issues that portfolio Ministers should know, which strengthens “Ministers receive audit insights”.","notes1":"","notes2":"","notes3":"","measures":[],"evalQuestions":[],"tagIds":[], ment.nz/2025/annual-report/our-performance/our-services/service-3","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"measure_e9c59868-3b8e-41c9-afda-fae3157e4e11"},{"id":"M002","title":"Audit reports remaining in arrears","mainText":"Track the count, age and entity type of overdue audits, with particular attention to smaller entities. Source: https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-3","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"measure_68d21ff3-b603-4411-85e6-b346468216ac"},{"id":"M003","title":"Appointed auditors with satisfactory quality grade","mainText":"Use the most recent quality assurance review and show both percentage and reviewed population. Source: https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-3","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"measure_992d3182-095e-4120-a53e-068e04c3ed55"},{"id":"M004","title":"Monthly Controller reports issued within five working days","mainText":"Measure September-to-May Controller reporting to the Treasury against the established timeliness target. Source: https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-2","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"measure_c789633c-d5a0-4aef-bdbf-ab6cafd7808c"},{"id":"M005","title":"Select committee briefings delivered by agreed deadline","mainText":"Measure the share of annual-review, Estimates and requested briefings delivered on time. Source: https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-1","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"measure_e73ce96e-3e26-4028-bd0c-97568c3e78f0"},{"id":"M006","title":"Select committees rating advice as helpful","mainText":"Use the biennial survey and report non-assessed years explicitly. Source: https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-1","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"measure_36399677-81ae-4b58-8767-175f12722ee7"},{"id":"M007","title":"Public entities satisfied with annual audit service","mainText":"Disaggregate in-house and external-provider results and examine timeliness and communication drivers. Source: https://oag.parliament.nz/2025/annual-report/our-performance/our-services/service-3","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"measure_6aebf5ff-eaa2-473c-938d-08360f3716b5"},{"id":"M008","title":"Recommendations showing verified progress at follow-up","mainText":"Track whether reported recommendations are implemented, partly implemented, superseded or unresolved. Source: https://www.oag.parliament.nz/reports/follow-ups","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"measure_86143a41-c380-4f2b-b657-73623c7ff9f2"}],"measureNextId":9,"evalQuestions":[{"id":"EQ001","questionText":"How well are audit quality and timeliness being sustained across different entity classes?","mainText":"Examine quality reviews, completion rates, arrears and provider capacity together rather than treating one measure as sufficient.","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"eq_6c1edc9c-5dea-4cbd-be6d-bae2cf03695d"},{"id":"EQ002","questionText":"Do annual audits improve the relevance and reliability of public performance reporting?","mainText":"Test changes in reporting practice, not only whether audit opinions were issued.","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"eq_cd57e702-77a1-4bce-b1b4-c66a1dc4a802"},{"id":"EQ003","questionText":"Are smaller entities receiving timely assurance without disproportionate reporting burden?","mainText":"Investigate school and small-entity timeliness, provider economics and whether reporting requirements remain fit for purpose.","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"eq_8ba84ed9-d895-45e5-9abb-5a57eb30f44d"},{"id":"EQ004","questionText":"Does the Controller process detect and resolve unauthorised expenditure early enough?","mainText":"Review monthly detection, departmental correction, escalation and annual reporting as one control chain.","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"eq_6cf60f89-46dd-4e63-9bd3-1d21f2982690"},{"id":"EQ005","questionText":"When do performance audits and inquiries lead to observable changes in public-sector practice?","mainText":"Compare recommendation design, entity response, follow-up evidence and wider sector influence.","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"eq_c88da108-7c21-4e67-85d2-32b561f244e0"},{"id":"EQ006","questionText":"How does the Office’s advice change the focus or effectiveness of parliamentary scrutiny?","mainText":"Use committee feedback, briefing use and scrutiny outcomes, while recognising Parliament controls its own decisions.","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"eq_a04b9149-20a6-4cc0-b891-0c2720b0f7cf"},{"id":"EQ007","questionText":"How meaningfully are Māori perspectives shaping audit choices, methods and accountability practice?","mainText":"Review capability, engagement quality, work-programme choices and the experience of iwi, hapū, whānau and kaupapa Māori organisations.","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"eq_d2a3565a-7256-4288-945c-09bffbea7ad1"},{"id":"EQ008","questionText":"Are capability, technology and resource choices keeping the Office independent and resilient?","mainText":"Test whether workforce, systems, funding and risk settings remain adequate through audit peaks and unexpected demands.","notes1":"","notes2":"","notes3":"","tagIds":[],"uid":"eq_b94e9692-f49d-4922-a9aa-46fb38b0d496"}],"eqNextId":9,"tags":[],"viewSettings":{"thisThen":{"showCounts":false,"showTrafficLights":false,"showPriorities":false,"showHowCounts":true,"showMeasures":false,"showEvalQuestions":false,"showMainText":false,"showFullMainText":false,"showMainTextCodeStyle":false,"showLateralHow":false,"showTags":false,"showLinkInfoOnHover":true,"showLinkInfoCodeStyle":false},"how":{"showNumbering":true,"showTrafficLights":true,"showPriorities":true @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
/* selected/current-box emphasis strengthened modestly so the eye is drawn to the selected box, not to secondary grey linked boxes. Thicker dark border + subtle halo + gentle lift via shadow. Kept conservative; distinction with inspect-home (3px #1e293b + stronger shadow) and reveal-active (2px #475569, no halo) is preserved. Grey linked / inspect-linked boxes remain modestly styled as before. */
.box.box-selected{border:2px solid #1e293b!important;box-shadow:0 0 0 2px rgba(30,41,59,0.10),0 2px 8px rgba(0,0,0,0.10)!important;z-index:3}
.how-box.box-selected{border:2px solid #1e293b!important;box-shadow:0 0 0 2px rgba(30,41,59,0.10),0 2px 8px rgba(0,0,0,0.10)!important;z-index:3}
.fo-box.box-selected{border:2px solid #1e293b!important;box-shadow:0 0 0 2px rgba(30,41,59,0.10),0 2px 8px rgba(0,0,0,0.10)!important;z-index:3}
.box.reveal-out::before{content:'';position:absolute;left:-1px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-left:8px solid #475569;z-index:2}
.box.reveal-in::after{content:'';position:absolute;right:-9px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-left:8px solid #475569;z-index:2}
.box.reveal-out-neg::before,.box.reveal-in-neg::after{border-left-color:#b91c1c!important}
.box.reveal-active{border:2px solid #475569!important}
.box.reveal-out::before,.box.reveal-in::after{cursor:pointer}
/* tooltip-bearing hover overlays for the small black reveal/link arrows. The arrows themselves are CSS pseudo-elements (::before / ::after) and cannot carry a title attribute, so these transparent overlay spans sit over the arrow area and carry the side-specific title tooltips. The overlays also cover the optional link traffic-light dot and remain outside the count-badge zone. */
.reveal-arrow-hover-out{position:absolute;left:-18px;top:50%;transform:translateY(-50%);width:30px;height:18px;z-index:4;cursor:pointer;background:transparent}
.reveal-arrow-hover-in{position:absolute;right:-18px;top:50%;transform:translateY(-50%);width:30px;height:18px;z-index:4;cursor:pointer;background:transparent}
.reveal-arrow-hover-out,.reveal-arrow-hover-in{overflow:visible}
.link-tl-dot{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;transform:translateY(-50%);box-shadow:0 0 0 1.5px #fff;z-index:10;pointer-events:auto}
.reveal-arrow-hover-out .link-tl-dot{left:3px}
.reveal-arrow-hover-in .link-tl-dot{left:-3px;right:auto}
.link-hover-pop{display:none}
.link-hover-portal{display:none;position:fixed;top:0;left:0;box-sizing:border-box;width:max-content;max-width:min(360px,calc(100vw - 16px));min-width:90px;padding:7px 10px;background:#fff;color:var(--text);border:1px solid var(--bdr);border-radius:6px;box-shadow:0 4px 14px rgba(15,23,42,0.16);font-size:12px;line-height:1.45;white-space:normal;overflow:hidden;z-index:3000;pointer-events:auto}
.link-hover-portal.open{display:block}
.link-hover-text{display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:5;max-height:calc(1.45em * 5);overflow:hidden;white-space:pre-wrap;overflow-wrap:anywhere}
.display-code-style{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;background:#f8fafc;border:1px solid #dbe3ee;border-radius:6px;white-space:pre-wrap;overflow-wrap:anywhere;word-break:normal}
.link-hover-text.display-code-style{display:block;-webkit-line-clamp:unset;max-height:calc(1.45em * 8);padding:5px 6px;overflow:auto}
.link-hover-tl-dot{position:static;display:inline-block;width:.83em;height:.83em;border-radius:50%;margin-right:.42em;vertical-align:-.08em;box-shadow:0 0 0 1.5px #fff}
.how-box.reveal-highlight{border:2px solid #475569!important}
.box.inspect-home{border:3px solid #1e293b!important;box-shadow:0 0 0 2px rgba(30,41,59,0.15)}
.box.inspect-linked{border:2px solid #94a3b8!important;background:rgba(148,163,184,0.08)!important}
.how-box.inspect-home{border:3px solid #1e293b!important;box-shadow:0 0 0 2px rgba(30,41,59,0.15)}
.how-box.inspect-linked{border:2px solid #94a3b8!important;background:rgba(148,163,184,0.08)!important}
.fo-box.inspect-home{border:3px solid #1e293b!important;box-shadow:0 0 0 2px rgba(30,41,59,0.15)}
.fo-box.inspect-linked{border:2px solid #94a3b8!important;background:rgba(148,163,184,0.08)!important}

/* custom tooltip. Replaces native title-based tooltips so they appear faster and are larger and easier to read. Kept compact, unobtrusive, and stable. The tooltip system (see DV_TIPS script below) intercepts the native title attribute on hover, hides the native tooltip, and shows this styled element after a short delay. */
.dv-tip{position:fixed;z-index:9999;background:#475569;color:#fff;padding:7px 11px;border-radius:6px;font-size:12.5px;font-weight:500;line-height:1.45;max-width:280px;box-shadow:0 3px 12px rgba(15,23,42,0.20);pointer-events:none;display:none;white-space:normal;letter-spacing:0.1px}
/* read-only copy styling. The .is-readonly class is applied to <body> when the board is loaded from an embedded state carrying isReadonly:true. It hides edit-oriented controls throughout the UI while preserving navigation, search, print, view settings, and other viewing functions. Keep modest \u2014 a small outline pill label near the board title, dimmed/hidden buttons, and hidden chat. Non-alarmist styling. */
/* Read-only copy label was previously rendered inside .hdr-right above the tagline as a translucent outline pill. */
/* the Read-Only Copy label is moved back to the left side of the header, rendered left-justified directly under the board title inside .hdr-title-wrap. The styling is intentionally modest \u2014 small, low-contrast, single line, no pill, no uppercase spacing, no warning-banner appearance \u2014 so it reads as a quiet mode indicator rather than a security guarantee. The honest tooltip clarifies that read-only copies are a UI-only restriction and not security protection. */
/* the Read-Only label is restyled as a modest pill and moved inline with the top utility links (alongside Board info, Measures, \u2026, Get training) rather than sitting under the title. The label text is "Read-Only Board" and reads as a status pill, not a clickable link or a warning banner. The font size is slightly larger than the previous tiny label so it stands out modestly without dominating; the subtle white outline + transparent background and small horizontal padding give it pill shape; cursor:help signals hover reveals the tooltip; user-select:none makes it feel like a status, not text. The honest tooltip remains unchanged ("Editing is disabled through the board interface. This is not security protection; someone with technical skills could still edit the HTML."). Display is gated by body.is-readonly so editable boards never show it. */
.ro-label{display:none;font-size:12px;color:#1e293b;font-weight:700;line-height:1.2;white-space:nowrap;padding:6px 12px;letter-spacing:0.1px;text-transform:none;background:#fff7ed;border:1.5px solid #fed7aa;border-radius:999px;cursor:help;user-select:none;align-self:center}
body.is-readonly .ro-label{display:inline-flex;align-items:center;justify-content:center}
/* in read-only Presentation View, the read-only status pill is also shown in the presentation top bar immediately to the left of Normal View. */
.presentation-bar .ro-label{margin-right:2px;color:#1e293b;background:#fff7ed;border-color:#fed7aa}

/* in a read-only copy, popup textareas and text inputs are made non-editable via the readOnly attribute set by applyReadonlyToModal() (called from openModal). These CSS rules back that up with visual styling that reads as non-editable at a glance \u2014 dimmed background, default (non-text) cursor, neutralised focus ring \u2014 so the UI does not imply editability when none is possible. Contenteditable regions (such as the doc-page editor, should it ever render in read-only mode) are also visually locked down. Search/filename inputs are excluded via the .ro-keep-editable escape hatch so viewing/filtering inputs still feel live. */

/* coherent non-box UI scaling. The board area (.main) already uses zoom:var(--board-scale) so boxes and on-board chrome (page bars, under-box details, etc.) scale together. Previously, the non-box UI/chrome sat outside .main at 1x, so header/tab-bar/page-info-bar/control-bar/attribution and all popups/modals/tooltip/save-toast/chat elements felt disproportionately small once the board was scaled. Each of these containers now participates in the same scaling logic via zoom:var(--board-scale), so the whole interface scales together. For fixed-size popups/modals/tooltip/chat panel, max-width/max-height/width/height are divided by --board-scale so their visible on-screen footprint stays consistent with pre-fix behavior while internal text scales coherently. The on-board box-chooser popup is appended inside #main and therefore keeps inheriting .main's zoom as before — no change needed. CSS zoom is already in use for .main, so relying on zoom here is consistent with the existing approach and avoids scattering many per-element font-size tweaks. */
/* Main popup/modal scaling is decoupled from board scale so popup text remains readable while the board is zoomed. */
/* main popup/modal width base increased from 820px to 1200px (still divided by --popup-scale) so the full popup is visible without sideways truncation and right-side controls such as Add are reachable without horizontal scrolling. Only .modal-box max-width changes here — --popup-scale itself is unchanged, .meq-detail-modal .modal-box and .ptc-box keep their existing max-width bases, and the popup heading size change lives with the .modal-box h3 rule earlier in the CSS. */
.hdr{zoom:var(--board-scale)}
.tab-bar{zoom:var(--board-scale)}
.page-info-bar{zoom:var(--board-scale)}
.ctrl-bar{zoom:var(--board-scale)}
.attr{zoom:var(--board-scale)}
.modal-box{zoom:var(--popup-scale);max-width:calc(1200px / var(--popup-scale));max-height:calc(82vh / var(--popup-scale))}
.meq-detail-modal .modal-box{max-width:calc(520px / var(--popup-scale))}
.ptc-box{zoom:var(--popup-scale);max-width:calc(400px / var(--popup-scale))}
#howPageTypeChooser .ptc-box{max-width:calc(680px / var(--popup-scale));max-height:calc(86vh / var(--popup-scale));overflow-y:auto}
.dv-tip{zoom:var(--board-scale);max-width:calc(280px / var(--board-scale))}
.save-toast{zoom:var(--board-scale)}
.chat-fab{zoom:var(--board-scale)}
.chat-panel{zoom:var(--board-scale);width:calc(500px / var(--board-scale));max-width:calc((100vw - 44px) / var(--board-scale));height:calc(620px / var(--board-scale));max-height:calc((100vh - 165px) / var(--board-scale))}

/* inner detail/edit popup content width fix. Previously the outer .modal-box was widened and the inline detail/entry panel (.ep) was rendered inside #epWrap inside .main, but the inner .ep panel had no explicit width and some inner rows (.ep-add, .ep-struct, .meq-add) could push right-side controls such as Add off the visible area, requiring horizontal scrolling. The fix targets only the inner edit/detail popup content: .ep is forced to use the available width with width:100% and max-width:none; .ep-ta is reinforced at width:100% (already so); .ep-add and .ep-struct keep their existing flex-wrap:wrap and now also have max-width:100% so they wrap rather than overflow; .meq-add (the picker+Add row inside Measure/Evaluation Question/Link detail modals) gets flex-wrap:wrap + max-width:100% for the same reason; .meq-section (parent of meq-add and meq-item rows) is constrained to max-width:100%. No outer modal width change here — that lives with the .modal-box rule earlier. No popup-scale change. No board-scale change. No schema, state, link, read-only, or interaction changes. */
.ep{width:100%;max-width:none}
.ep-ta{width:100%}
.ep-add{flex-wrap:wrap;max-width:100%}
.ep-struct{flex-wrap:wrap;max-width:100%}
.meq-add{flex-wrap:wrap;max-width:100%}
.meq-section{max-width:100%}
/* This–Then / How link popup overflow. The .ep / detail-panel rules above targeted those classes, but the remaining overflow problem was specifically the This–Then / How link popup, where the inner row containing the dropdown/select and the Add button could still push the Add button off to the right and require horizontal scrolling. The fix targets the actual link-popup rows (the .tt-link-add and .how-link-add rows used by buildTTLinkPicker, buildHowActingOnPicker, buildHowLinkTTPicker, buildHowLinkHowPicker, buildLateralHowOnTTPopupPicker, etc., plus the .meq-add picker+Add rows used inside the Link detail popup buildLinkMeasuresSection / buildLinkEQSection): .tt-link-add and .how-link-add now have flex-wrap:wrap + max-width:100% (parallel to the .ep-add / .ep-struct / .meq-add rules) so they wrap rather than overflow at narrow widths; .tt-link-section and .how-link-section are constrained to max-width:100% as their containers; and .tt-link-sel, .how-link-sel, and .meq-sel get min-width:0 + max-width:100% so the select itself can shrink below its widest option text rather than forcing the row wider than its container — without min-width:0, a flex item's default min-width:auto resolves to min-content and prevents shrink even with flex:1 + flex-shrink:1. No outer modal width change; no popup-scale change beyond the default board-scale change in :root; no schema, state, link, read-only, or interaction changes. */
.tt-link-add{flex-wrap:wrap;max-width:100%}
.how-link-add{flex-wrap:wrap;max-width:100%}
.tt-link-section{max-width:100%}
.how-link-section{max-width:100%}
.tt-link-sel{min-width:0;max-width:100%}
.how-link-sel{min-width:0;max-width:100%}
.meq-sel{min-width:0;max-width:100%}
