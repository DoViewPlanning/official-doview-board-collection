<div class="modal-ov" id="infoModal"><div class="modal-box"><h3>Info for developers</h3><p style="font-size:14px;line-height:1.7;color:var(--text2)">DoView boards are a proven approach to planning that can be adapted to any topic, context, or scale, and are shaped by thousands of real-world applications. Behind the simplicity of the This–Then layout is a robust conceptual foundation in outcomes theory, helping ensure that what gets built is not just visually clear but analytically sound.<br><br>The main website for DoView Boards and DoView Planning is <a href="https://doviewplanning.org" target="_blank" rel="noopener noreferrer">DoViewPlanning.org</a>. You can find information about the approach and many examples of boards there. You can find our GitHub at <a href="https://doviewplanning.org/doviewboards" target="_blank" rel="noopener noreferrer">DoViewPlanning.org/DoViewBoards</a>. It includes the DoView Board minimum specification, developer integration guidance, configuration reference material, and other resources for building DoView-compatible boards, apps, platforms, and systems.<br><br>Developers are encouraged to implement, extend, and build DoView-compatible boards within any app, platform, or system, with acknowledgment. Details are at <a href="https://doviewplanning.org/trademarkuse" target="_blank" rel="noopener noreferrer">DoViewPlanning.org/trademarkuse</a>.<br><br>The GitHub also includes the example reference JavaScript engine that created this DoView Board, a prompt for building PowerPoint DoViews, our Gartner Cool Vendor award-winning DoView legacy app, examples of DoView Boards, and other resources.<br><br>Thinking more broadly, DoView Boards could potentially be used as a GUI “intent engineering” interface for building and controlling agentic systems, and perhaps by agentic systems themselves to plan and coordinate their activity if you want to develop them further in this direction.<br><br>DoViews are drawn to a minimum specification so they are fit for purpose. Please follow this minimum specification for how DoView Boards are structured and presented, and innovate as much as you like on top of it. If you put DoView Boards into any app, platform, or system, please let us know if you are able.<br><br>The Official DoView® Badge: Standards-Compliant Board Structure is separate from general DoView-compatible use. If you want your app, platform, or system to use the Official DoView® Badge, please contact us at <a href="https://doviewplanning.org/contact" target="_blank" rel="noopener noreferrer">DoViewPlanning.org/contact</a>.<br><br>If you want conceptual help implementing or extending DoView Boards, please contact us through <a href="https://doviewplanning.org" target="_blank" rel="noopener noreferrer">DoViewPlanning.org</a>. You can also see projects where we would like to collaborate with developers at <a href="https://doviewplanning.org/collaborate" target="_blank" rel="noopener noreferrer">DoViewPlanning.org/collaborate</a>.</p><button class="modal-close" onclick="closeModal('infoModal')">Close</button></div></div>

function navTo(id){if(document.activeElement&&document.activeElement.isContentEditable)return;

  if(sourceRefBox&&sourceRefBox.returned&&id!==currentPage){sourceRefBox=null;inspectHome=null;inspectLinkedKeys=[];}

  if(id!==currentPage){navHistory.push(currentPage);if(navHistory.length>MAX_NAV_HIST)navHistory.shift();navFuture=[];}

function renderSubpage(pid){const sp=SP.find(s=>s.id===pid);if(!sp)return '';const nc=sp.cols.length;const singlePage=SP.length===1;const barColor=singlePage?COL_COLORS[0].tab:spColor(sp).tab;const cols=sp.cols.map((col,ci)=>{const isLast=ci===nc-1;const colColor=singlePage?COL_COLORS[ci%COL_COLORS.length]:spColor(sp);const boxes=col.boxes.map((_,bi)=>{const k=`${sp.id}-c${ci}-b${bi}`;return B[k]?boxHTML(k,B[k],isLast,colColor):'';}).join('');return `<div class="col-wrap"><div class="col-h ${isLast?'last-col':''}" ondblclick="dblEditColH(event,'${sp.id}',${ci})" id="ch-${sp.id}-c${ci}">${escHtml(col.h)}</div><div class="col-boxes">${boxes}</div></div>`;});let inner='';cols.forEach((col,i)=>{inner+=col;if(i<cols.length-1){const arrowColor=singlePage?COL_COLORS[i%COL_COLORS.length].bdr:spColor(sp).bdr;inner+=`<div class="col-arrow"><svg width="10" height="18" viewBox="0 0 10 18"><polygon points="0,0 10,9 0,18" fill="${arrowColor}" opacity="0.45"/></svg></div>`;}});const backBtn=backToOverviewButtonHTML();return `${backBtn}<div class="tt-bar" style="background:${barColor}"><span>This\u2013Then</span><span class="page-bar-title" ondblclick="dblEditPageBarTitle(event,'${pid}')" title="Double-click to rename page">${escHtml(sp.label)}</span>${presentationView?'':selectedTTBoxActionsHTML(pid)}</div><div class="board-scroll"><div class="ttw"><div class="sidebar"><span>This</span></div><div class="cols-row">${inner}</div><div class="sidebar"><span>Then</span></div></div></div>`;}
function moveSelectedTTColumnRight(key){if(IS_READONLY)return;const m=key&&parseTTBoxKey(key);if(!m)return;const spId=m.spId,ci=m.ci,bi=m.bi;const sp=SP.find(s=>s.id===spId);if(!sp||!Array.isArray(sp.cols)||ci>=sp.cols.length-1)return;takeSnapshot();const keyMap={};const leftBoxes=sp.cols[ci].boxes||[];const rightBoxes=sp.cols[ci+1].boxes||[];for(let i=0;i<leftBoxes.length;i++){keyMap[`${spId}-c${ci}-b${i}`]=`${spId}-c${ci+1}-b${i}`;}for(let i=0;i<rightBoxes.length;i++){keyMap[`${spId}-c${ci+1}-b${i}`]=`${spId}-c${ci}-b${i}`;}const tmp=sp.cols[ci];sp.cols[ci]=sp.cols[ci+1];sp.cols[ci+1]=tmp;rebuildBoxKeys(spId,keyMap);buildDepsMap();cascade();saveState();openBox=`${spId}-c${ci+1}-b${bi}`;render();}
function addTTBoxUnderSelected(spId){if(IS_READONLY)return;const sp=SP.find(s=>s.id===spId);if(!sp)return;takeSnapshot();if(openBox){const m=openBox.match(/^(p\d+)-c(\d+)-b(\d+)$/);if(m&&m[1]===spId){const ci=parseInt(m[2]),bi=parseInt(m[3]);/* Preserve box state and links while positional keys shift. */const oldColLen=sp.cols[ci].boxes.length;const keyMap={};for(let j=bi+1;j<oldColLen;j++){keyMap[`${spId}-c${ci}-b${j}`]=`${spId}-c${ci}-b${j+1}`;}sp.cols[ci].boxes.splice(bi+1,0,'New box');rebuildBoxKeys(spId,keyMap);const nk=`${spId}-c${ci}-b${bi+1}`;if(!B[nk])B[nk]={label:'New box',light:'',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',/* stable uid at creation. */uid:_genUid('box')};buildDepsMap();cascade();saveState();render();return;}}if(sp.cols.length){const ci=0;sp.cols[ci].boxes.push('New box');const bi=sp.cols[ci].boxes.length-1;const k=`${spId}-c${ci}-b${bi}`;B[k]={label:'New box',light:'',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',/* stable uid at creation. */uid:_genUid('box')};buildDepsMap();cascade();saveState();render();}}
function renderHowPage(pid){const sp=SP.find(s=>s.id===pid);if(!sp)return '';const boxes=(sp.howBoxes||[]).map(hb=>{const key=`${sp.id}-${hb.id}`;const boxData=B[key];if(!boxData)return '';return howBoxHTML(key,boxData,howBoxDisplayId(hb));}).join('');const backBtn=backToOverviewButtonHTML();return `${backBtn}<div class="how-bar"><span>How</span><span class="page-bar-title" ondblclick="dblEditPageBarTitle(event,'${pid}')" title="Double-click to rename page">${escHtml(sp.label)}</span>${presentationView?'':selectedHowBoxActionsHTML(pid)}</div><div class="how-grid">${boxes}</div>`;}
function renderDocPage(pid){var sp=SP.find(function(s){return s.id===pid;});if(!sp)return '';var backBtn=backToOverviewButtonHTML();var docBar='<div class="doc-bar"><span>Documentation</span><span class="page-bar-title" ondblclick="dblEditPageBarTitle(event,\''+pid+'\')" title="Double-click to rename page">'+escHtml(sp.label)+'</span></div>';var saved=docContent[pid]||'';var safeSaved=sanitizeDocHtml(saved);var resolvedContent=linkifyDocHtml(resolveDocClones(safeSaved));if(docEditMode[pid]){var editContent=resolveDocClonesForEdit(safeSaved);return backBtn+docBar+'<div class="doc-page"><div class="doc-toolbar"><select class="doc-sel" onchange="docExecBlock(this.value);this.selectedIndex=0"><option value="">Paragraph</option><option value="H1">Heading 1</option><option value="H2">Heading 2</option><option value="H3">Heading 3</option></select><div class="doc-tbtn-sep"></div><button class="doc-tbtn" title="Bold" onclick="docExec(\'bold\')"><b>B</b></button><button class="doc-tbtn" title="Italic" onclick="docExec(\'italic\')"><i>I</i></button><button class="doc-tbtn" title="Underline" onclick="docExec(\'underline\')"><u>U</u></button><div class="doc-tbtn-sep"></div><button class="doc-tbtn" title="Bullet list" onclick="docExec(\'insertUnorderedList\')">•</button><button class="doc-tbtn" title="Numbered list" onclick="docExec(\'insertOrderedList\')">1.</button><div class="doc-tbtn-sep"></div><button class="doc-tbtn" title="Block quote" onclick="docExec(\'formatBlock\',\'BLOCKQUOTE\')">&ldquo;</button><button class="doc-tbtn" title="Insert link" onclick="docInsertLink()">\u{1F517}</button><div class="doc-tbtn-sep"></div><button class="doc-tbtn" title="Insert clone" onclick="openCloneChooser(\''+pid+'\')" style="font-size:10px;width:auto;padding:0 8px">\u{1F517} Clone</button><div class="doc-tbtn-sep"></div><button class="doc-tbtn" title="Undo" onclick="docExec(\'undo\')">↩</button></div><div class="doc-save-bar doc-save-bar-top" style="margin-top:6px;margin-bottom:6px"><button class="doc-save-btn" onclick="docSaveEdit(\''+pid+'\')">Save</button><button class="doc-cancel-btn" onclick="docCancelEdit(\''+pid+'\')">Cancel</button></div><div class="doc-editor" id="docEditor" contenteditable="true" oninput="docSave(\''+pid+'\')" onpaste="docPaste(event)">'+( editContent||'<p>Start writing here...</p>')+'</div><div class="doc-save-bar"><button class="doc-save-btn" onclick="docSaveEdit(\''+pid+'\')">Save</button><button class="doc-cancel-btn" onclick="docCancelEdit(\''+pid+'\')">Cancel</button></div></div>';}return backBtn+docBar+'<div class="doc-page"><div class="doc-edit-bar"><button class="doc-edit-btn" onclick="docStartEdit(\''+pid+'\')">Edit</button></div><div class="doc-read" id="docReadArea">'+( resolvedContent||'<p style="color:var(--text2);font-style:italic">No content yet. Click Edit to start writing.</p>')+'</div></div>';}

/* docInsertLink previously took whatever the user typed in the prompt() and passed it directly to document.execCommand('createLink'); a user typing JavaScript:alert(1) would have produced a clickable JavaScript: anchor in the saved Documentation Page content. The entered URL is now resolved through the _safeUrl helper and the createLink command is only run when _safeUrl returns a safe URL. Unsafe / blank URLs are rejected with a small alert so the user knows the link was not created. The contenteditable HTML editor's safe display path (linkifyDocHtml, which walks text nodes, escapes, then linkifies) is unchanged. Stored Documentation Page content is not rewritten. */
function docInsertLink(){var url=prompt('Enter URL:');if(url){var safe=_safeUrl(url);if(safe){document.execCommand('createLink',false,safe);var sel=window.getSelection&&window.getSelection();var node=sel&&sel.anchorNode;var a=node&&node.nodeType===1?node:(node?node.parentElement:null);while(a&&a.tagName!=='A')a=a.parentElement;if(a&&a.tagName==='A'){a.setAttribute('target','_blank');a.setAttribute('rel','noopener noreferrer');}}else{try{alert('That URL was not added because it could not be opened safely. Please use an https:// or http:// URL, or a plain domain like example.org.');}catch(_){}}}var el=document.getElementById('docEditor');if(el)el.focus();}

function resolveCloneText(type,key){
  if(type==='page_title'){if(key==='final')return 'Final Outcomes';const sp=SP.find(s=>s.id===key);return sp?sp.label:null;}
  if(type==='box_title'){const b=B[key];return b?b.label:null;}
  if(type==='box_main_text'){const b=B[key];return b?(b.label+': '+(b.detailText||'(no display text)')):null;}
  if(type==='measure'){const m=getMeasure(key);return m?measureDisplayId(m)+' '+m.title:null;}
  if(type==='eval_question'){const q=getEQ(key);return q?eqDisplayId(q)+' '+q.questionText:null;}
  if(type==='link'){const l=ttLinks.find(x=>x.id===key)||howLinks.find(x=>x.id===key);if(!l)return null;const fb=B[l.from],tb=B[l.to];if(!fb||!tb)return null;return (fb.label)+' \u2192 '+(tb.label);}
  return null;
}
function cloneTypeLabel(type){
  if(type==='page_title')return 'Page title';if(type==='box_title')return 'Box title';if(type==='box_main_text')return 'Box Display Text';if(type==='measure')return 'Measure';if(type==='eval_question')return 'Evaluation Question';if(type==='link')return 'Link';return 'Clone';
}
function sanitizeDocClones(html){
  if(!html)return html;
  return html.replace(/<div class="doc-clone[^"]*"([^>]*)>[\s\S]*?<\/div>/g,function(match,attrs){
    var typeM=attrs.match(/data-clone-type="([^"]*)"/i);var keyM=attrs.match(/data-clone-key="([^"]*)"/i);
    if(!typeM||!keyM||!isSafeDocClone(typeM[1],keyM[1]))return '';
    return '<div class="doc-clone" data-clone-type="'+escAttr(typeM[1])+'" data-clone-key="'+escAttr(keyM[1])+'"></div>';
  });
}
function ensureBlankTargetRel(root){if(!root||!root.querySelectorAll)return;try{root.querySelectorAll('a[target="_blank"]').forEach(function(a){var rel=(a.getAttribute('rel')||'').toLowerCase().split(/\s+/).filter(Boolean);if(rel.indexOf('noopener')<0)rel.push('noopener');if(rel.indexOf('noreferrer')<0)rel.push('noreferrer');a.setAttribute('rel',rel.join(' '));});}catch(e){}}
function linkifyDocHtml(html){if(!html)return html;var d=document.createElement('div');d.innerHTML=html;function walkText(node){if(node.nodeType===3){var t=node.textContent;var linked=linkify(t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));if(linked!==t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')){var span=document.createElement('span');span.innerHTML=linked;node.parentNode.replaceChild(span,node);}}else if(node.nodeType===1&&node.tagName!=='A'&&!node.classList.contains('doc-clone')){var children=Array.from(node.childNodes);children.forEach(walkText);}}walkText(d);ensureBlankTargetRel(d);return d.innerHTML;}
function resolveDocClones(html){
  if(!html)return html;
  return html.replace(/<div class="doc-clone[^"]*"([^>]*)>[\s\S]*?<\/div>/g,function(match,attrs){
    var typeM=attrs.match(/data-clone-type="([^"]*)"/);var keyM=attrs.match(/data-clone-key="([^"]*)"/);
    if(!typeM||!keyM)return match;
    var type=typeM[1],key=keyM[1];var text=resolveCloneText(type,key);
    var label=cloneTypeLabel(type);
    if(text===null)return '<div class="doc-clone doc-clone-broken" data-clone-type="'+type+'" data-clone-key="'+key+'"><span class="doc-clone-label">'+escHtml(label)+' (missing)</span> [Source deleted]</div>';
    var clickAction=cloneClickAction(type,key);
    return '<div class="doc-clone" data-clone-type="'+type+'" data-clone-key="'+key+'" onclick="'+clickAction+'"><span class="doc-clone-label">'+escHtml(label)+'</span> '+escHtml(text)+'</div>';
  });
}
function resolveDocClonesForEdit(html){
  if(!html)return html;
  return html.replace(/<div class="doc-clone[^"]*"([^>]*)>[\s\S]*?<\/div>/g,function(match,attrs){
    var typeM=attrs.match(/data-clone-type="([^"]*)"/);var keyM=attrs.match(/data-clone-key="([^"]*)"/);
    if(!typeM||!keyM)return match;
    var type=typeM[1],key=keyM[1];var text=resolveCloneText(type,key);
    var label=cloneTypeLabel(type);
    if(text===null)return '<div class="doc-clone doc-clone-broken" data-clone-type="'+type+'" data-clone-key="'+key+'" contenteditable="false"><span class="doc-clone-label">'+escHtml(label)+' (missing)</span> [Source deleted] <span class="doc-clone-rm" onclick="event.stopPropagation();removeCloneBlock(this.parentElement)" title="Remove clone">\u2715</span></div>';
    return '<div class="doc-clone" data-clone-type="'+type+'" data-clone-key="'+key+'" contenteditable="false"><span class="doc-clone-label">'+escHtml(label)+'</span> '+escHtml(text)+' <span class="doc-clone-rm" onclick="event.stopPropagation();removeCloneBlock(this.parentElement)" title="Remove clone">\u2715</span></div>';
  });
}
function cloneClickAction(type,key){
  if(type==='page_title'){return "navTo('"+key+"')";}
  if(type==='box_title'||type==='box_main_text'){return "navToBox('"+key+"')";}
  if(type==='measure'){return "openMeasureDetail('"+key+"')";}
  if(type==='eval_question'){return "openEQDetail('"+key+"')";}
  if(type==='link'){return "openLinkDetail('"+key+"')";}
  return '';
}

function updateCloneChooserStep2(){

  }else if(type==='box_title'||type==='box_main_text'){
    html='<label>Box</label><select id="cloneSourceKey" onchange="cloneKeyChanged()">';
    /* list Final Outcomes FIRST in the clone picker so they are easier to find, wrapped in their own optgroup, with each option labelled "Final Outcome \u2014 <text>" so they are clearly identifiable as Final Outcome boxes. Ordinary This\u2013Then box options below continue to show just their text/label (no "Box title" prefix). How Box options below continue to show their existing How number prefix. */

    }
    SP.forEach(function(sp){
      if(sp.pageType==='documentation')return;
      var grpOpts='';
      if((sp.pageType||'this_then')==='this_then'){sp.cols.forEach(function(col,ci){col.boxes.forEach(function(_,bi){var k=sp.id+'-c'+ci+'-b'+bi;var b=B[k];if(!b)return;grpOpts+='<option value="'+k+'">'+escHtml(b.label)+'</option>';});});}
      if(sp.pageType==='how'&&sp.howBoxes){sp.howBoxes.forEach(function(hb){var k=sp.id+'-'+hb.id;var b=B[k];if(!b)return;grpOpts+='<option value="'+k+'">'+escHtml(howBoxDisplayId(hb))+' \u2014 '+escHtml(b.label)+'</option>';});}
      if(grpOpts)html+='<optgroup label="'+escAttr(sp.label)+'">'+grpOpts+'</optgroup>';
    });
    html+='</select>';
  }else if(type==='measure'){
    html='<label>Measure</label><select id="cloneSourceKey" onchange="cloneKeyChanged()">';
    if(!measures.length)html+='<option value="">(no measures exist)</option>';
    else measures.forEach(function(m){html+='<option value="'+m.id+'">'+escHtml(measureDisplayId(m))+' \u2014 '+escHtml(m.title)+'</option>';});
    html+='<option value="__create_new__">+ Create new measure</option>';
    html+='</select>';
  }else if(type==='eval_question'){
    html='<label>Evaluation Question</label><select id="cloneSourceKey" onchange="cloneKeyChanged()">';
    if(!evalQuestions.length)html+='<option value="">(no evaluation questions exist)</option>';
    else evalQuestions.forEach(function(q){html+='<option value="'+q.id+'">'+escHtml(eqDisplayId(q))+' \u2014 '+escHtml(q.questionText)+'</option>';});
    html+='<option value="__create_new__">+ Create new evaluation question</option>';

function normalizedVerticalHowLevel(level){if(level===null||level===undefined)return null;var n=parseInt(level,10);return Number.isFinite(n)&&n>0?n:null;}

  else if(cmd==='addSubpage'&&parts.length>=2){const wasSingle=SP.length===1;const label=parts[1];let pType='this_then';if(parts.length>=3&&!parts[2].startsWith('#')&&['this_then','how','documentation'].includes(parts[2])){pType=parts[2];}let bg,bdr,tab;const colorStart=pType!=='this_then'?3:2;if(parts.length>=colorStart+3){const avail=nextAutoPageColor();bg=sanitizeColorValue(parts[colorStart],avail.bg);bdr=sanitizeColorValue(parts[colorStart+1],avail.bdr);tab=sanitizeColorValue(parts[colorStart+2],avail.tab);}else{const avail=nextAutoPageColor();bg=avail.bg;bdr=avail.bdr;tab=avail.tab;}const id=nextUnusedPageId();/* stable uid on the new page. */const _pageUid=_genUid('page');if(pType==='how'){const howBoxes=[];for(let i=1;i<=8;i++){const hid='H'+String(i).padStart(3,'0');/* stable uid on each starter How Box record. */howBoxes.push({id:hid,label:'How (action, person, team, unit, organization, capability, \u2026)',uid:_genUid('box')});}SP.push({id,label,pageType:'how',color:{bg,bdr,tab},cols:[],howBoxes,nextHowNum:9,howLevel:nextVerticalHowLevel(),uid:_pageUid});howBoxes.forEach(hb=>{B[`${id}-${hb.id}`]={label:hb.label,light:'',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',tagIds:[],uid:hb.uid};});}else{/* stable uid on the default first column of a new this_then / documentation page. */SP.push({id,label,pageType:pType,color:{bg,bdr,tab},cols:[{h:'First Stage',boxes:[],uid:_genUid('col')}],uid:_pageUid});}if(wasSingle){addChatMsg('system','This is now a multi-page board. The overview page has been added and the original page now uses a single color scheme to match the overview tiles.');currentPage='overview';}buildDepsMap();saveState();render();}

/* Preserve box state and links while positional keys shift. */
function rebuildBoxKeys(spId,keyMap){markRuntimeLinkIndexDirty();const sp=SP.find(s=>s.id===spId);if(!sp)return;if(keyMap&&typeof keyMap==='object'){const captured={};Object.keys(B).filter(k=>k.indexOf(spId+'-c')===0).forEach(k=>{captured[k]=B[k];delete B[k];});Object.keys(captured).forEach(oldK=>{let newK;if(Object.prototype.hasOwnProperty.call(keyMap,oldK)){newK=keyMap[oldK];}else{newK=oldK;}if(newK===''||newK==null)return;B[newK]=captured[oldK];});sp.cols.forEach((col,ci)=>{col.boxes.forEach((label,bi)=>{const k=`${spId}-c${ci}-b${bi}`;if(!B[k])B[k]={label,light:'',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',tagIds:[],uid:_genUid('box')};B[k].label=label;});});function _remap(k){if(k&&typeof k==='string'&&k.indexOf(spId+'-c')===0&&Object.prototype.hasOwnProperty.call(keyMap,k)){return keyMap[k];}return k;}if(typeof ttLinks!=='undefined'&&Array.isArray(ttLinks)){ttLinks.forEach(l=>{if(l&&l.from)l.from=_remap(l.from);if(l&&l.to)l.to=_remap(l.to);});ttLinks=ttLinks.filter(l=>l&&l.from&&l.to);}if(typeof howLinks!=='undefined'&&Array.isArray(howLinks)){howLinks.forEach(l=>{if(l&&l.from)l.from=_remap(l.from);if(l&&l.to)l.to=_remap(l.to);});howLinks=howLinks.filter(l=>l&&l.from&&l.to);}if(typeof openBox!=='undefined'&&openBox){const r=_remap(openBox);openBox=(r==='')?null:r;}if(typeof inspectHome!=='undefined'&&inspectHome){const r=_remap(inspectHome);inspectHome=(r==='')?null:r;}if(typeof revealBox!=='undefined'&&revealBox){const r=_remap(revealBox);revealBox=(r==='')?null:r;}if(typeof inspectLinkedKeys!=='undefined'&&Array.isArray(inspectLinkedKeys)){inspectLinkedKeys=inspectLinkedKeys.map(_remap).filter(k=>k);}if(typeof sourceRefBox!=='undefined'&&sourceRefBox&&sourceRefBox.sourceKey){const r=_remap(sourceRefBox.sourceKey);if(r!=='')sourceRefBox.sourceKey=r;}cleanupTTLinks();cleanupHowLinks();return;}const oldB={};Object.keys(B).filter(k=>k.startsWith(spId+'-')).forEach(k=>{oldB[k]=B[k];delete B[k];});sp.cols.forEach((col,ci)=>{col.boxes.forEach((label,bi)=>{const k=`${spId}-c${ci}-b${bi}`;const old=oldB[k];B[k]=old||{label,light:'',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',tagIds:[]};B[k].label=label;});});cleanupTTLinks();cleanupHowLinks();}
function rebuildFinalKeys(){normalizeFinalOutcomesInMemory();const oldB={};Object.keys(B).filter(k=>k.startsWith('final-')).forEach(k=>{oldB[k]=B[k];delete B[k];});FO_DATA.forEach((label,i)=>{const k=`final-b${i}`;const old=oldB[k];B[k]=old||{label:label,light:'',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',measures:[],evalQuestions:[],tagIds:[]};B[k].label=label;});}

/* detect explicit blank/starter This\u2013Then page requests in the user's chat message. Returns true when the user clearly asks for a blank/starter/empty/shell page rather than a populated one. Used to bypass the populated-page validation so genuinely-blank requests still create a blank/starter page. */
function isBlankPageRequest(msg){if(!msg)return false;return /\b(blank|starter|empty|shell|skeleton)\b/i.test(msg);}

/* detect populated This\u2013Then page requests in the user's chat message. Returns true when the user is asking for a populated/filled-in This\u2013Then page about a topic. The trigger phrasings cover the common cases: "populate it", "add DoView this-then boxes", "create a this-then logic for X", "add a this-then page", and "add a page and fill it in". This also includes "full DoView", "complete DoView", "full logic", and "full populated page" so phrasings such as "add a new page called X which includes a full DoView on it" reliably propose a populated This\u2013Then page. It also removes the previous broad "add a page about X" matcher (without an explicit this-then keyword or populated trigger) so a bare "add a page about X" is now classified as ambiguous (see isAmbiguousPageCreationRequest) and asks for the page type instead. It also extends phrase coverage further so common informal phrasings reliably propose a populated This\u2013Then page when the intent is clear: "do/make the full map (for X)", "map this out", "build out (a/this) page", "fill out this page", "build the full logic", and "turn this into a full page". Tight phrasings only \u2014 the broad word "map" by itself, or "section" by itself, do NOT trigger; question-only requests are NOT triggered. An explicit blank/starter request short-circuits to false so a clearly-blank request bypasses populated-page validation. Used by processAIResponse to validate that the AI's proposed structural actions actually populate the new page rather than leaving it as a one-box placeholder. */
function isPopulatedThisThenPageRequest(msg){if(!msg)return false;if(isBlankPageRequest(msg))return false;if(/\bpopulate\b/i.test(msg))return true;if(/\bfill\s+(it|in|out|the\s+page|out\s+this\s+page)\b/i.test(msg))return true;/* "full DoView" / "complete DoView" / "full logic" / "full populated page" all trigger populated This\u2013Then page behavior. */if(/\b(full|complete)\s+doview\b/i.test(msg))return true;if(/\bfull\s+(logic|populated\s+page|populated)\b/i.test(msg))return true;/* "build the full logic" (a non-noun-form alternative to "full logic") also triggers populated. */if(/\bbuild\s+(the\s+|a\s+)?full\s+logic\b/i.test(msg))return true;/* "do the full map" / "make the full map" / "the full map for X" trigger populated. The bare word "map" by itself does NOT trigger \u2014 it must be preceded by "do/make/build the full" or be the verb in "map this out". */if(/\b(do|make|build)\s+(the\s+|a\s+)?full\s+map\b/i.test(msg))return true;if(/\bmap\s+(this|it|that)\s+out\b/i.test(msg))return true;/* "build out (a/this/the) page", "fill out this page", "turn this into a full page" trigger populated. These phrasings are about populating a page, not just creating a shell. */if(/\bbuild\s+out\s+(a\s+|an\s+|the\s+|this\s+)?page\b/i.test(msg))return true;if(/\bturn\s+(this|it|that)\s+into\s+(a\s+)?full\s+page\b/i.test(msg))return true;if(/\b(add|create|make)\s+(a\s+|an\s+)?(new\s+)?this[-\u2013\s]*then\s+page\b/i.test(msg))return true;if(/\bcreate\s+(a\s+|an\s+)?this[-\u2013\s]*then\s+(logic|page|flow)\b/i.test(msg))return true;if(/\badd\s+(doview\s+)?(this[-\u2013\s]*then\s+)?boxes\b/i.test(msg))return true;if(/\badd\s+(a\s+|an\s+)?(new\s+)?page\b.*\bfill\b/i.test(msg))return true;return false;}

/* detect generic page-creation phrasings in the user's chat message. Returns true when the user is asking to add/create/make a page (or "add X as a page"). Used together with isExplicitPageType, isBlankPageRequest, and isPopulatedThisThenPageRequest to decide whether a page-creation request is ambiguous and needs the page-type clarification question. Deliberately tight so it does not misfire on rename/delete/edit ("rename this page", "delete this page") or board-level commentary. It also detects "make/add another tab", "set up a section (for X)", "build out (a/this/the) page", and "turn this into a full page" so common informal page-creation phrasings are recognised. Tight phrasings only \u2014 the bare word "section" or "tab" or "map" does NOT trigger; questions like "what does this map say about X" do NOT trigger. */
function isPageCreationRequest(msg){if(!msg)return false;if(/\b(add|create|make)\s+(a\s+|an\s+)([a-z\u2013-]+\s+){0,3}page\b/i.test(msg))return true;if(/\b(add|create|make)\s+(a\s+|an\s+)?new\s+([a-z\u2013-]+\s+){0,3}page\b/i.test(msg))return true;if(/\bnew\s+(this[-\u2013\s]*then|how|documentation|doc)\s+page\b/i.test(msg))return true;if(/\bas\s+a\s+(new\s+)?(this[-\u2013\s]*then|how|documentation|doc)?\s*page\b/i.test(msg))return true;/* "make another tab", "add another tab", "make a new tab" \u2014 page-creation by another name. */if(/\b(make|add|create)\s+(another|a\s+new|a)\s+tab\b/i.test(msg))return true;/* "set up a section (for X)" \u2014 ambiguous page-creation. The bare word "section" without "set up a" does NOT trigger. */if(/\bset\s+up\s+(a\s+|an\s+)?(new\s+)?section\b/i.test(msg))return true;/* "build out a/this/the page", "turn this into a full page" \u2014 also page-creation phrasings (these typically mean populated, but isPopulatedThisThenPageRequest will catch the populated intent and bypass the ambiguity check). */if(/\bbuild\s+out\s+(a\s+|an\s+|the\s+|this\s+)?page\b/i.test(msg))return true;if(/\bturn\s+(this|it|that)\s+into\s+(a\s+)?(full\s+)?page\b/i.test(msg))return true;return false;}

/* detect whether the user has explicitly stated which page type they want (This\u2013Then, How, or Documentation). Used by isAmbiguousPageCreationRequest. Includes common variants like "doc page", "this-then page", "this then page", "how page". */
function isExplicitPageType(msg){if(!msg)return false;if(/\bthis[-\u2013\s]*then\s+page\b/i.test(msg))return true;if(/\bhow\s+page\b/i.test(msg))return true;if(/\b(documentation|doc)\s+page\b/i.test(msg))return true;return false;}

/* detect ambiguous page-creation requests where the user has asked to add/create/make a page but has NOT specified which page type they want and has NOT clearly implied a populated This\u2013Then page (via "full DoView", "populate it", etc.). Examples that should be classified as ambiguous: "add a page called leadership development", "create a new page about leadership development", "make a page for leadership development", "add leadership development as a page". Examples that are NOT ambiguous: "add a How page called X" (explicit type), "add a blank This\u2013Then page" (explicit type with blank qualifier), "add a complete DoView page about X" (populated trigger), "add a full populated page about X" (populated trigger). Note: a blank request without an explicit page type ("add a starter page called X") is still ambiguous because the page type is missing \u2014 the AI must ask which type before creating. Used by processAIResponse to reject any addSubpage emitted for an ambiguous request before queuing pendingStructural so no page is silently created. */
function isAmbiguousPageCreationRequest(msg){if(!msg)return false;if(!isPageCreationRequest(msg))return false;if(isExplicitPageType(msg))return false;if(isPopulatedThisThenPageRequest(msg))return false;return true;}

/* pick the page type from an addSubpage action array. Mirrors the parsing in execAction's addSubpage branch so validation and summary stay consistent with apply behavior. Defaults to this_then. */
function _pageTypeFromAddSubpage(a){if(!a||a[0]!=='addSubpage')return 'this_then';if(a.length>=3 && a[2] && a[2].charAt(0)!=='#' && ['this_then','how','documentation'].indexOf(a[2])>=0)return a[2];return 'this_then';}

/* , walk the structural actions array and predict the new page id assigned by execAction's addSubpage branch. New ids use the next unused pN value, not the current page count alone, so deleted pages do not cause id collisions. Returns an array of {action, predictedId, pageType} entries, one per addSubpage in order. */
function _predictNewPageIds(structActions){var out=[];var used={};(SP||[]).forEach(function(sp){if(sp&&sp.id)used[sp.id]=true;});structActions.forEach(function(a){if(a[0]==='addSubpage'){var pType=_pageTypeFromAddSubpage(a);var id=nextUnusedPageId(used);used[id]=true;out.push({action:a,predictedId:id,pageType:pType});}});return out;}

/* preflight validation for an entire action set before anything is applied. Performs a dry-run over a working "shadow" model that mirrors the parts of execAction's behavior that affect target resolution: addSubpage adds a new page with the next predicted id (and a default first column "First Stage" for this_then / documentation, no columns for how pages); addColumn / removeColumn / moveColumn updates the working column list; addBox / removeBox updates the working box list (and renumbers indices because rebuildBoxKeys does the same on apply); addFinalOutcome / removeFinalOutcome updates the working FO list; createMeasure / createEQ / deleteMeasure / deleteEQ updates the working measure / EQ id list; addTTLink / addHowLink / removeTTLink / removeHowLink updates working link id maps. The validator does NOT execute real actions; it only checks that every action references a valid object (existing in the current state OR created earlier in the same set), that page types are supported (this_then, how, documentation), that column indices are valid for the resolved page, that new labels/headings are non-empty, that addBox actions have valid page+column targets, that the action's parts.length meets CMD_MIN_PARTS for that command, and that the command name appears in SUPPORTED_CMDS. Returns {ok:true} or {ok:false, message:'...'}. The message is plain-language; never a stack trace or raw internal error. */
function _validateActionSet(actions){
  if(!Array.isArray(actions)||!actions.length)return {ok:true};
  // Working shadow state. We model only the parts of execAction that affect target resolution.
  var W={
    pages:{},  // pid -> {pageType, cols:[{h, boxes:[label,...]}], howIds:[h001,...], finalRm:false}
    pageOrder:[],  // pids in order
    fo:FO_DATA.slice(),  // list of labels (positions used as bI)
    measures:measures.map(function(m){return m.id;}),
    eqs:evalQuestions.map(function(q){return q.id;}),
    ttLinkIds:ttLinks.map(function(l){return l.id;}),
    howLinkIds:howLinks.map(function(l){return l.id;})
  };
  // Seed W.pages from current SP
  SP.forEach(function(sp){
    var entry={pageType:sp.pageType||'this_then',cols:[],howIds:[]};
    if(entry.pageType==='how'){if(sp.howBoxes)entry.howIds=sp.howBoxes.map(function(h){return h.id;});}
    else{(sp.cols||[]).forEach(function(col){entry.cols.push({h:col.h,boxes:(col.boxes||[]).slice()});});}
    W.pages[sp.id]=entry;W.pageOrder.push(sp.id);

  function nextShadowPageId(){var n=((SP&&SP.length)||0)+1;while(W.pages['p'+n])n++;return 'p'+n;}
  function resolveBoxKey(k){
    if(!k)return null;
    var m=k.match(/^(p\d+)-c(\d+)-b(\d+)$/);
    if(m){var pid=m[1],ci=parseInt(m[2]),bi=parseInt(m[3]);var pg=W.pages[pid];if(!pg||pg.pageType==='how')return null;if(!pg.cols[ci])return null;if(pg.cols[ci].boxes[bi]===undefined)return null;return {kind:'tt',pid:pid,ci:ci,bi:bi};}
    var hm=k.match(/^(p\d+)-(H\d{3,})$/);
    if(hm){var pid2=hm[1],hid=hm[2];var pg2=W.pages[pid2];if(!pg2||pg2.pageType!=='how')return null;if(pg2.howIds.indexOf(hid)<0)return null;return {kind:'how',pid:pid2,hid:hid};}
    var fm=k.match(/^final-b(\d+)$/);
    if(fm){var i=parseInt(fm[1]);if(i<0||i>=W.fo.length)return null;return {kind:'final',fi:i};}
    return null;
  }
  for(var idx=0;idx<actions.length;idx++){
    var a=actions[idx];if(!Array.isArray(a)||!a.length)return {ok:false,message:'I could not apply that change because the action format was incomplete or malformed. No changes were made.'};

/* Validate populated This\u2013Then page proposals. Given the structural actions array, count addColumn / removeColumn / addBox actions targeting each predicted new this_then page id, and report any predicted page where the resulting structure would be a one-box placeholder or sparse: fewer than 3 columns total or fewer than 6 boxes. Engine adds 1 default column ("First Stage") when an addSubpage:this_then runs, so total columns = 1 + addColumn(this id) - removeColumn(this id). Total boxes = addBox(this id). This also flags pages whose column headings are mechanical numbered placeholders such as "Stage 1", "Stage 2", "Column 1", "Step 2", "Phase 3" \u2014 these are rejected because column headings must name real causal stages. It also flags pages whose column headings are dominated by the generic logic-model template Inputs / Activities / Outputs (specifically: 2 or more of those generic words used as headings together) so a mechanical "Inputs / Activities / Outputs" page is rejected unless the AI uses a domain-specific shape; single occurrences of those words are still allowed because a domain may genuinely have one stage called "Outputs". The default first-column heading "First Stage" is left alone (this is the engine's default until the AI renames it via renameColumn) \u2014 the AI is expected to renameColumn it to a domain-specific heading; if it does not rename it, the count of generic headings still flags the proposal. Returns array of insufficient predicted page descriptors with totalCols, addBoxes, hasGenericHeadings, and a human-readable reason string. */
function _findInsufficientThisThenPageProposals(structActions){var preds=_predictNewPageIds(structActions);var bad=[];var genericRx=/^(stage|column|step|phase)\s*\d+$/i;var genericTemplateRx=/^(inputs?|activities|outputs?)$/i;preds.forEach(function(p){if(p.pageType!=='this_then')return;var pid=p.predictedId;var addCols=structActions.filter(function(a){return a[0]==='addColumn' && a[1]===pid;}).length;var rmCols=structActions.filter(function(a){return a[0]==='removeColumn' && a[1]===pid;}).length;var totalCols=1+addCols-rmCols;var addBoxes=structActions.filter(function(a){return a[0]==='addBox' && a[1]===pid;}).length;/* scan addColumn / renameColumn headings for mechanical numbered placeholders. If any heading targeting this page id matches the generic pattern, flag the proposal. also count Inputs/Activities/Outputs headings; flag when 2 or more occur together. */var hasGenericHeadings=false;var templateCount=0;for(var k=0;k<structActions.length;k++){var a2=structActions[k];if((a2[0]==='renameColumn' || a2[0]==='addColumn') && a2[1]===pid){var heading=(a2.slice(3).join(':')||'').trim();if(genericRx.test(heading)){hasGenericHeadings=true;}if(genericTemplateRx.test(heading)){templateCount++;}}}var hasGenericTemplate=templateCount>=2;var reason=[];if(totalCols<3)reason.push('only '+totalCols+' column'+(totalCols===1?'':'s'));if(addBoxes<6)reason.push('only '+addBoxes+' box'+(addBoxes===1?'':'es'));if(hasGenericHeadings)reason.push('mechanical numbered column headings');if(hasGenericTemplate)reason.push('generic Inputs / Activities / Outputs template headings');if(reason.length){bad.push({predictedId:pid,label:p.action[1]||'(untitled)',totalCols:totalCols,addBoxes:addBoxes,hasGenericHeadings:hasGenericHeadings,hasGenericTemplate:hasGenericTemplate,reason:reason.join(', ')});}});return bad;}

function processAIResponse(fullText,userMsg){const{clean,actions}=parseActions(fullText);if(!actions.length)return clean;
  /* preflight validation runs first \u2014 before snapshot, before any state-action execution, before showing OK/Cancel. If any action is malformed, has an unsupported command name, or targets a missing object, the WHOLE action set is rejected with a plain-language message and nothing is applied. */
  var v=_validateActionSet(actions);
  if(!v.ok){addChatMsg('system',v.message);return clean;}
  const stateActions=actions.filter(a=>!STRUCTURAL_CMDS.includes(a[0]));const structActions=actions.filter(a=>STRUCTURAL_CMDS.includes(a[0]));
  /* if the user's request is an ambiguous page-creation request (no page type specified, no populated trigger), reject any addSubpage actions emitted by the AI. The AI is expected by the prompt to ask the page-type clarification question instead of emitting addSubpage; this engine-side guard is a safety net so a page is never silently created with the wrong type. Other action shapes (state changes, removals, renames, link/measure/EQ actions, etc.) are unaffected by this guard. */
  if(structActions.length && userMsg && isAmbiguousPageCreationRequest(userMsg)){var hasAddSubpage=structActions.some(function(a){return a[0]==='addSubpage';});if(hasAddSubpage){addChatMsg('system','Your request did not specify the page type (This\u2013Then page, How page, or Documentation page). The change has not been applied. Please clarify which type of page you want \u2014 see the question above \u2014 and the board chat will then propose the right page.');return clean;}}
  /* If the user clearly asked for a populated This\u2013Then page (and did not explicitly ask for a blank/starter page), validate that the AI's proposed structural actions would actually create a properly populated page. Reject sparse proposals (fewer than 3 columns or fewer than 6 boxes) or proposals with mechanical numbered column headings or generic Inputs/Activities/Outputs template headings. The change is rejected before queuing pendingStructural so a one-box placeholder or generic-template page is never silently applied. Other action shapes (How pages, Documentation pages, removals, renames, link/measure/EQ actions, etc.) are unaffected. */
  if(structActions.length && userMsg && isPopulatedThisThenPageRequest(userMsg)){var insufficient=_findInsufficientThisThenPageProposals(structActions);if(insufficient.length){var listing=insufficient.map(function(x){return '"'+x.label+'" ('+x.reason+')';}).join('; ');addChatMsg('system','It looks like you asked for a populated This\u2013Then page, but the proposed change would not create a properly populated page: '+listing+'. A populated This\u2013Then page should have at least 3 columns and at least 6 boxes, and the column headings must name real causal stages for the domain (not "Stage 1, Stage 2, Stage 3" or a generic "Inputs / Activities / Outputs" template). The change has not been applied. Please ask again with more domain-specific detail, or say "add a blank/starter page about X" if you really want a shell.');return clean;}}
  /* mixed-transaction handling. State-only responses still apply directly with a snapshot (preserving the existing safe direct-apply path). Structural-only responses still queue pendingStructural and show OK/Cancel. Mixed responses queue BOTH state and structural actions and present them together in one OK/Cancel preview, so the user sees the full change set and Cancel rolls back to a clean state without partial application. */
  if(structActions.length && stateActions.length){
    takeSnapshot();
    pendingStateActions=stateActions;
    pendingStructural=structActions;

  return clean;
}

/* showConfirmation now accepts either a string description (legacy) or the structural-actions array. When given the actions array it renders a clean structured summary that groups addSubpage + addColumn / renameColumn / addBox actions by predicted new page id, and shows the page title, the column headings, and the actual box count for each new page. Other structural actions render as one line each. The summary makes it clear what will be added before the user clicks OK. The pendingStructural array (carrying the FULL set of proposed columns and boxes) is unchanged and is still applied in order by confirmStructural on OK. showConfirmation now also accepts a mixed object {state:[...],structural:[...]} so a chat response containing both state and structural actions can be presented in ONE OK/Cancel preview that covers both kinds. */
function showConfirmation(descOrActions){var msgs=document.getElementById('chatMsgs');var div=document.createElement('div');div.className='chat-m sys';var summaryHTML;if(descOrActions && !Array.isArray(descOrActions) && typeof descOrActions==='object' && (descOrActions.state||descOrActions.structural)){summaryHTML=_buildStructuralChangeSummaryHTML(descOrActions.structural||[],descOrActions.state||[]);}else if(Array.isArray(descOrActions)){summaryHTML=_buildStructuralChangeSummaryHTML(descOrActions);}else{summaryHTML='<div style="margin:4px 0">'+escHtml(String(descOrActions))+'</div>';}div.innerHTML='\u26a0\ufe0f Change(s) proposed:'+summaryHTML+'<button onclick="confirmStructural(true)" style="background:#22c55e;color:#fff;border:none;border-radius:5px;padding:4px 12px;margin:5px 4px 0 0;cursor:pointer;font-size:11px;font-weight:600">OK</button><button onclick="confirmStructural(false)" style="background:#ef4444;color:#fff;border:none;border-radius:5px;padding:4px 12px;margin:5px 0 0;cursor:pointer;font-size:11px;font-weight:600">Cancel</button>';msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}

/* Build the structured summary HTML for the confirmation message. addSubpage actions are grouped with their related addColumn / renameColumn / addBox actions (by predicted new page id) into a single readable line per new page that shows the page type, title, column headings and box count. The preview adds a small Populated / Blank-starter status pill for This\u2013Then page proposals so the OK / Cancel preview makes obvious whether a full page is being proposed or only a shell. Unrelated structural actions (removals, renames, etc.) render as one bullet line each, escaped. */
function _buildStructuralChangeSummaryHTML(actions,stateActionsForPreview){
  /* per-action friendly preview lines for individual structural and state actions. addSubpage groupings (with addColumn / renameColumn / addBox children) are still rendered as the existing rich grouped line. Other actions \u2014 especially destructive ones \u2014 now render with plain-language wording that names the affected object (page, column, box, final outcome, Measure, EQ, link, association) so the user understands what will happen before clicking OK. Targets are resolved from current state SP / B / FO_DATA / measures / evalQuestions / ttLinks / howLinks; resolution failures fall back to a compact tag-only line. By the time we reach this function, _validateActionSet has already run and rejected unresolvable targets, so resolution should normally succeed.

  function _safe(s){return escHtml(String(s==null?'':s));}

  function _renderSingleAction(a){
    var cmd=a[0];
    if(cmd==='removeBox'){var rb=B[a[1]];var bm=a[1]&&a[1].match(/^(p\d+)-c(\d+)-b(\d+)$/);var pl=bm?_pageLabelById(bm[1]):'';return 'Remove box "'+_safe(_resolveAnyBoxLabel(a[1]))+'"'+(pl?' from page "'+_safe(pl)+'"':'')+'.';}
    if(cmd==='renameBox'){return 'Rename box "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to "'+_safe(a.slice(2).join(':'))+'".';}
    if(cmd==='addBox'){var pl2=_pageLabelById(a[1]);var ci2=parseInt(a[2]);var ch=_resolveColumnHeading(a[1],ci2);return 'Add new box "'+_safe(a.slice(3).join(':'))+'" to column "'+_safe(ch)+'" on page "'+_safe(pl2)+'".';}

    if(cmd==='renameColumn'){var pl4=_pageLabelById(a[1]);var ch4=_resolveColumnHeading(a[1],parseInt(a[2]));return 'Rename column "'+_safe(ch4)+'" on page "'+_safe(pl4)+'" to "'+_safe(a.slice(3).join(':'))+'".';}
    if(cmd==='addColumn'){var pl5=_pageLabelById(a[1]);return 'Add new column "'+_safe(a.slice(3).join(':'))+'" to page "'+_safe(pl5)+'".';}
    if(cmd==='moveColumn'){var pl6=_pageLabelById(a[1]);var ch6=_resolveColumnHeading(a[1],parseInt(a[2]));return 'Move column "'+_safe(ch6)+'" on page "'+_safe(pl6)+'" to position '+( (parseInt(a[3])||0)+1)+'.';}
    if(cmd==='removeSubpage'){return 'Remove page "'+_safe(_pageLabelById(a[1]))+'".';}
    if(cmd==='addFinalOutcome'){return 'Add new final outcome "'+_safe(a.slice(1).join(':'))+'".';}
    if(cmd==='removeFinalOutcome'){var fi=parseInt(a[1]);var fl=(fi>=0&&fi<FO_DATA.length)?FO_DATA[fi]:('#'+fi);return 'Remove final outcome "'+_safe(fl)+'".';}
    if(cmd==='deleteMeasure'){return 'Delete Measure "'+_safe(_resolveMeasureTitle(a[1]))+'" (and remove all its associations).';}
    if(cmd==='deleteEQ'){return 'Delete Evaluation Question "'+_safe(_resolveEQText(a[1]))+'" (and remove all its associations).';}
    if(cmd==='removeTTLink'){var pr=_resolveTTLinkPair(a[1]);if(pr)return 'Remove structural link from "'+_safe(pr.from)+'" to "'+_safe(pr.to)+'".';return 'Remove structural link '+_safe(a[1])+'.';}

// ─── MEASURES & EVALUATION QUESTIONS ───
function getMeasure(id){var nid=normalizeMeasureIdInput(id);return measures.find(m=>m.id===nid);}
function getEQ(id){var nid=normalizeEQIdInput(id);return evalQuestions.find(q=>q.id===nid);}
function _uniqueNormalizedIds(list,normalizer){var out=[];var seen={};(Array.isArray(list)?list:[]).forEach(function(id){var n=normalizer(id);if(!n||seen[n])return;seen[n]=true;out.push(n);});return out;}
function uniqueMeasureRefs(list){return _uniqueNormalizedIds(list,normalizeMeasureIdInput);}
function uniqueEQRefs(list){return _uniqueNormalizedIds(list,normalizeEQIdInput);}
function normalizeBoxMEQRefs(box){if(!box)return;if(!Array.isArray(box.measures))box.measures=[];else box.measures=uniqueMeasureRefs(box.measures);if(!Array.isArray(box.evalQuestions))box.evalQuestions=[];else box.evalQuestions=uniqueEQRefs(box.evalQuestions);}
function normalizeBoxMEQRefsInMemory(){if(!B)return;Object.keys(B).forEach(function(k){normalizeBoxMEQRefs(B[k]);});}
function normalizeMeasureEvalQuestionIdsInMemory(){
  if(Array.isArray(measures)){measures.forEach(function(m){if(m&&m.id)m.id=normalizeMeasureIdInput(m.id);});}
  if(Array.isArray(evalQuestions)){evalQuestions.forEach(function(q){if(q&&q.id)q.id=normalizeEQIdInput(q.id);});}
  if(Array.isArray(ttLinks)){ttLinks.forEach(function(l){if(!l)return;if(Array.isArray(l.measures))l.measures=uniqueMeasureRefs(l.measures);if(Array.isArray(l.evalQuestions))l.evalQuestions=uniqueEQRefs(l.evalQuestions);});}
}
function getMeasuresForBox(boxKey){var box=B[boxKey];if(!box)return [];normalizeBoxMEQRefs(box);return box.measures.map(getMeasure).filter(function(m){return !!m;});}
function getEvalQuestionsForBox(boxKey){var box=B[boxKey];if(!box)return [];normalizeBoxMEQRefs(box);return box.evalQuestions.map(getEQ).filter(function(q){return !!q;});}
function getBoxesForMeasure(mId){var nid=normalizeMeasureIdInput(mId);return Object.keys(B).filter(function(k){normalizeBoxMEQRefs(B[k]);return B[k].measures.includes(nid);});}
function getBoxesForEvalQuestion(eqId){var nid=normalizeEQIdInput(eqId);return Object.keys(B).filter(function(k){normalizeBoxMEQRefs(B[k]);return B[k].evalQuestions.includes(nid);});}
function getBoxesLinkedToMeasure(mId){return getBoxesForMeasure(mId);}
function getBoxesLinkedToEQ(eqId){return getBoxesForEvalQuestion(eqId);}

function createNewMeasure(linkToBox){if(IS_READONLY)return;const id='M'+String(measureNextId).padStart(3,'0');measureNextId++;const m={id:id,title:'New measure',mainText:'',notes1:'',notes2:'',notes3:'',trafficLight:'',tagIds:[],uid:_genUid('measure')};measures.push(m);if(linkToBox&&B[linkToBox]){normalizeBoxMEQRefs(B[linkToBox]);if(!B[linkToBox].measures.includes(id))B[linkToBox].measures.push(id);}saveState();render();setTimeout(function(){openMeasureDetail(id);},0);}
function createNewEQ(linkToBox){if(IS_READONLY)return;const id='EQ'+String(eqNextId).padStart(3,'0');eqNextId++;const q={id:id,questionText:'New evaluation question',mainText:'',notes1:'',notes2:'',notes3:'',trafficLight:'',tagIds:[],uid:_genUid('eq')};evalQuestions.push(q);if(linkToBox&&B[linkToBox]){normalizeBoxMEQRefs(B[linkToBox]);if(!B[linkToBox].evalQuestions.includes(id))B[linkToBox].evalQuestions.push(id);}saveState();render();setTimeout(function(){openEQDetail(id);},0);}

function linkMeasureToBox(mId,boxKey){if(IS_READONLY)return;if(!B[boxKey])return;var nid=normalizeMeasureIdInput(mId);normalizeBoxMEQRefs(B[boxKey]);if(nid&&!B[boxKey].measures.includes(nid))B[boxKey].measures.push(nid);saveState();render();}
function unlinkMeasureFromBox(mId,boxKey){if(IS_READONLY)return;if(!B[boxKey])return;var nid=normalizeMeasureIdInput(mId);normalizeBoxMEQRefs(B[boxKey]);B[boxKey].measures=B[boxKey].measures.filter(id=>id!==nid);saveState();render();}
function linkEQToBox(eqId,boxKey){if(IS_READONLY)return;if(!B[boxKey])return;var nid=normalizeEQIdInput(eqId);normalizeBoxMEQRefs(B[boxKey]);if(nid&&!B[boxKey].evalQuestions.includes(nid))B[boxKey].evalQuestions.push(nid);saveState();render();}
function unlinkEQFromBox(eqId,boxKey){if(IS_READONLY)return;if(!B[boxKey])return;var nid=normalizeEQIdInput(eqId);normalizeBoxMEQRefs(B[boxKey]);B[boxKey].evalQuestions=B[boxKey].evalQuestions.filter(id=>id!==nid);saveState();render();}

function deleteMeasure(mId){if(IS_READONLY)return;const nid=normalizeMeasureIdInput(mId);const m=getMeasure(nid);if(!m)return;const linked=getBoxesLinkedToMeasure(nid);if(linked.length){const boxNames=linked.map(k=>B[k]?B[k].label:k).join(', ');if(!confirm('Measure '+measureDisplayId(m)+' "'+m.title+'" is linked to '+linked.length+' box(es): '+boxNames+'.\n\nDeleting it will remove those links. Continue?'))return;}else{if(!confirm('Delete measure '+measureDisplayId(m)+' "'+m.title+'"?'))return;}takeSnapshot();linked.forEach(k=>{if(B[k]&&B[k].measures)B[k].measures=B[k].measures.filter(id=>normalizeMeasureIdInput(id)!==nid);});ttLinks.forEach(function(l){if(l.measures)l.measures=l.measures.filter(function(id){return normalizeMeasureIdInput(id)!==nid;});});measures=measures.filter(x=>x.id!==nid);saveState();closeModal('measureDetailModal');closeModal('measuresRegistryModal');render();}
function deleteEQ(eqId){if(IS_READONLY)return;const nid=normalizeEQIdInput(eqId);const q=getEQ(nid);if(!q)return;const linked=getBoxesLinkedToEQ(nid);if(linked.length){const boxNames=linked.map(k=>B[k]?B[k].label:k).join(', ');if(!confirm('Evaluation Question '+eqDisplayId(q)+' "'+q.questionText+'" is linked to '+linked.length+' box(es): '+boxNames+'.\n\nDeleting it will remove those links. Continue?'))return;}else{if(!confirm('Delete evaluation question '+eqDisplayId(q)+' "'+q.questionText+'"?'))return;}takeSnapshot();linked.forEach(k=>{if(B[k]&&B[k].evalQuestions)B[k].evalQuestions=B[k].evalQuestions.filter(id=>normalizeEQIdInput(id)!==nid);});ttLinks.forEach(function(l){if(l.evalQuestions)l.evalQuestions=l.evalQuestions.filter(function(id){return normalizeEQIdInput(id)!==nid;});});evalQuestions=evalQuestions.filter(x=>x.id!==nid);saveState();closeModal('eqDetailModal');closeModal('eqRegistryModal');render();}

function addMeasureFromPicker(boxKey){const sel=document.getElementById('meqMPicker');if(!sel||!sel.value)return;linkMeasureToBox(sel.value,boxKey);}
function addEQFromPicker(boxKey){const sel=document.getElementById('meqEQPicker');if(!sel||!sel.value)return;linkEQToBox(sel.value,boxKey);}

document.getElementById('eqDetailModal').dataset.meqId=eqId;openModal('eqDetailModal');}

function saveMeasureDetail(){if(IS_READONLY){closeModal('measureDetailModal');return;}const mId=document.getElementById('measureDetailModal').dataset.meqId;const m=getMeasure(mId);if(!m)return;const nextDisplay=String((document.getElementById('meqMDisplayId')||{}).value||'').trim();if(!nextDisplay){alert('Measure displayed identifier cannot be blank.');openMeasureDetail(mId);return;}if(duplicateMeasureDisplayId(m,nextDisplay)){alert('That Measure displayed identifier is already used.');openMeasureDetail(mId);return;}const nextTitle=(document.getElementById('meqMTitle')||{}).value||m.title;const nextMain=(document.getElementById('meqMMain')||{}).value||'';const nextN1=(document.getElementById('meqMN1')||{}).value||'';const nextN2=(document.getElementById('meqMN2')||{}).value||'';const nextN3=(document.getElementById('meqMN3')||{}).value||'';const nextLight=normalizeTrafficLightValue((document.getElementById('meqMTrafficLight')||{}).value||'');const changed=nextDisplay!==measureDisplayId(m)||nextTitle!==m.title||nextMain!==(m.mainText||'')||nextN1!==(m.notes1||'')||nextN2!==(m.notes2||'')||nextN3!==(m.notes3||'')||nextLight!==meqTrafficLightValue(m);if(changed)takeSnapshot();m.displayId=nextDisplay;m.title=nextTitle;m.mainText=nextMain;m.notes1=nextN1;m.notes2=nextN2;m.notes3=nextN3;m.trafficLight=nextLight;if(changed)saveState();closeModal('measureDetailModal');render();}
function saveEQDetail(){if(IS_READONLY){closeModal('eqDetailModal');return;}const eqId=document.getElementById('eqDetailModal').dataset.meqId;const q=getEQ(eqId);if(!q)return;const nextDisplay=String((document.getElementById('meqEQDisplayId')||{}).value||'').trim();if(!nextDisplay){alert('Evaluation Question displayed identifier cannot be blank.');openEQDetail(eqId);return;}if(duplicateEQDisplayId(q,nextDisplay)){alert('That Evaluation Question displayed identifier is already used.');openEQDetail(eqId);return;}const nextQuestion=(document.getElementById('meqEQTitle')||{}).value||q.questionText;const nextMain=(document.getElementById('meqEQMain')||{}).value||'';const nextN1=(document.getElementById('meqEQN1')||{}).value||'';const nextN2=(document.getElementById('meqEQN2')||{}).value||'';const nextN3=(document.getElementById('meqEQN3')||{}).value||'';const nextLight=normalizeTrafficLightValue((document.getElementById('meqEQTrafficLight')||{}).value||'');const changed=nextDisplay!==eqDisplayId(q)||nextQuestion!==q.questionText||nextMain!==(q.mainText||'')||nextN1!==(q.notes1||'')||nextN2!==(q.notes2||'')||nextN3!==(q.notes3||'')||nextLight!==meqTrafficLightValue(q);if(changed)takeSnapshot();q.displayId=nextDisplay;q.questionText=nextQuestion;q.mainText=nextMain;q.notes1=nextN1;q.notes2=nextN2;q.notes3=nextN3;q.trafficLight=nextLight;if(changed)saveState();closeModal('eqDetailModal');render();}

function escAttr(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}


// Measure/EQ display helpers keep stored/internal IDs padded for compatibility while showing unpadded IDs to users.
function displayMeasureId(id){return String(id||'').replace(/^M0+(\d+)$/,'M$1');}
function displayEQId(id){return String(id||'').replace(/^EQ0+(\d+)$/,'EQ$1');}
function normalizeMeasureIdInput(id){var x=String(id||'').trim().toUpperCase(),m=x.match(/^M(\d+)$/);return m?'M'+String(parseInt(m[1],10)).padStart(3,'0'):x;}
function normalizeEQIdInput(id){var x=String(id||'').trim().toUpperCase(),m=x.match(/^(?:EQ|Q)(\d+)$/);return m?'EQ'+String(parseInt(m[1],10)).padStart(3,'0'):x;}

// user-defined visual tag helpers. Tags are board-level definitions referenced by element tagIds.
function normalizeTagShortLabel(s){return String(s||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);}
function getTag(id){return (tags||[]).find(function(t){return t&&t.id===id;});}
function cleanTagIds(ids){if(!Array.isArray(ids))return [];var seen={},out=[];ids.forEach(function(id){if(id&&!seen[id]&&getTag(id)){seen[id]=true;out.push(id);}});return out;}
function tagHTMLForElement(el){if(!el)return '';var ids=cleanTagIds(el.tagIds||[]);return ids.map(function(id){var t=getTag(id);if(!t)return '';var sl=normalizeTagShortLabel(t.shortLabel||'');if(!sl)return '';return '<span class="doview-tag" title="Tag: '+escAttr(t.label||sl)+'">\u00B7 '+escHtml(sl)+'</span>';}).join('');}
function tagHTMLForBox(box){var vs=currentPage==='final'?viewSettings.finalOutcomes:(getViewForPage(currentPage)||{});return (vs.showTags===false)?'':tagHTMLForElement(box);}
function ensureTagIdsOnSupportedElements(){Object.values(B||{}).forEach(function(b){if(b&&!Array.isArray(b.tagIds))b.tagIds=[];});(SP||[]).forEach(function(sp){if(sp&&sp.overviewCard&&!Array.isArray(sp.overviewCard.tagIds))sp.overviewCard.tagIds=[];});(ttLinks||[]).forEach(function(l){if(l&&!Array.isArray(l.tagIds))l.tagIds=[];});(howLinks||[]).forEach(function(l){if(l&&!Array.isArray(l.tagIds))l.tagIds=[];});(measures||[]).forEach(function(m){if(m&&!Array.isArray(m.tagIds))m.tagIds=[];});(evalQuestions||[]).forEach(function(q){if(q&&!Array.isArray(q.tagIds))q.tagIds=[];});}
function buildInlineCreateTag(kind,id,pickerId,selectWord){if(IS_READONLY)return '';var suffix=String(pickerId).replace(/[^A-Za-z0-9_]/g,'_');return '<div class="tag-edit-only" style="margin-top:6px;display:flex;gap:5px;flex-wrap:wrap;align-items:center"><input class="tag-short-input" id="newTagShort_'+suffix+'" maxlength="6" placeholder="Tag"><input class="tag-label-input" id="newTagLabel_'+suffix+'" placeholder="Tag name"><input class="tag-desc-input" id="newTagDesc_'+suffix+'" placeholder="Description (optional)"><button class="meq-abtn" onclick="createInlineTagAndApply(\''+kind+'\',\''+id+'\',\''+pickerId+'\')">'+(selectWord||'Create and apply')+'</button></div>';}
function buildTagAssignmentSection(kind,id,el){if(!el)return '';if(!Array.isArray(el.tagIds))el.tagIds=[];var ids=cleanTagIds(el.tagIds||[]);el.tagIds=ids;var cur=ids.length?ids.map(function(tid){var t=getTag(tid);if(!t)return '';var sl=normalizeTagShortLabel(t.shortLabel||'');return '<span class="ep-tag-pill" title="Tag: '+escAttr(t.label||sl)+'">'+escHtml(sl)+(IS_READONLY?'':' <span class="ep-tag-rm tag-edit-only" onclick="removeTagFromElement(\''+kind+'\',\''+id+'\',\''+tid+'\')" title="Remove tag">✕</span>')+'</span>';}).join(' '):'None';var add='';if(!IS_READONLY){var pickerId='tagPicker_'+kind+'_'+String(id).replace(/[^A-Za-z0-9_]/g,'_');var opts='<option value="">Select tag…</option>';(tags||[]).forEach(function(t){if(!ids.includes(t.id)){opts+='<option value="'+escAttr(t.id)+'">'+escHtml(normalizeTagShortLabel(t.shortLabel||''))+' — '+escHtml(t.label||'')+'</option>';}});add='<select class="meq-sel tag-edit-only" id="'+pickerId+'" style="max-width:160px" onfocus="refreshTagPicker(\''+kind+'\',\''+id+'\',\''+pickerId+'\')">'+opts+'</select><button class="meq-abtn tag-edit-only" onclick="addTagFromElementPicker(\''+kind+'\',\''+id+'\',\''+pickerId+'\')">Add tag</button><span class="meq-footer-link tag-edit-only" onclick="openTagsManager()">Manage tags</span>'; }return '<div class="ep-tags"><span class="ep-lbl">Tags:</span><span>'+cur+'</span>'+add+'</div>';}
function buildBoxTagsSection(key){return buildTagAssignmentSection('box',key,B[key]);}
function getTaggedElement(kind,id){if(kind==='box')return B[id];if(kind==='overviewPage'){var sp=findPageById(id);return sp?ensureOverviewCardMeta(sp):null;}if(kind==='ttLink')return (ttLinks||[]).find(function(l){return l.id===id;});if(kind==='howLink')return (howLinks||[]).find(function(l){return l.id===id;});if(kind==='measure')return getMeasure(id);if(kind==='eq')return getEQ(id);return null;}
function refreshTagPicker(kind,id,pickerId){var sel=document.getElementById(pickerId);if(!sel)return;var el=getTaggedElement(kind,id)||{tagIds:[]};var ids=cleanTagIds(el.tagIds||[]);var cur=sel.value;var opts='<option value="">Add tag…</option>';(tags||[]).forEach(function(t){if(!ids.includes(t.id)||t.id===cur)opts+='<option value="'+escAttr(t.id)+'">'+escHtml(normalizeTagShortLabel(t.shortLabel||''))+' — '+escHtml(t.label||'')+'</option>';});sel.innerHTML=opts;if(cur)sel.value=cur;}
function createInlineTagAndApply(kind,id,pickerId){if(IS_READONLY)return;var suffix=String(pickerId).replace(/[^A-Za-z0-9_]/g,'_');var sl=normalizeTagShortLabel((document.getElementById('newTagShort_'+suffix)||{}).value);var lab=String((document.getElementById('newTagLabel_'+suffix)||{}).value||'').trim();var desc=String((document.getElementById('newTagDesc_'+suffix)||{}).value||'').trim();if(!sl&&!lab){alert('Tag name cannot be empty.');return;}if(!sl)sl=normalizeTagShortLabel(lab);if(!lab)lab=sl;var tag={id:_genUid('tag'),shortLabel:sl,label:lab,description:desc};tags.push(tag);var el=getTaggedElement(kind,id);if(el){if(!Array.isArray(el.tagIds))el.tagIds=[];if(!el.tagIds.includes(tag.id))el.tagIds.push(tag.id);}saveState();render();if(kind==='measure')openMeasureDetail(id);else if(kind==='eq')openEQDetail(id);else if(kind==='ttLink'||kind==='howLink')openLinkDetail(id);else if(kind==='box')openEntryPanel(id);}
function addTagFromElementPicker(kind,id,pickerId){if(IS_READONLY)return;refreshTagPicker(kind,id,pickerId);var sel=document.getElementById(pickerId);var el=getTaggedElement(kind,id);if(!sel||!sel.value||!el)return;if(!Array.isArray(el.tagIds))el.tagIds=[];if(!el.tagIds.includes(sel.value))el.tagIds.push(sel.value);saveState();render();if(kind==='measure')openMeasureDetail(id);else if(kind==='eq')openEQDetail(id);else if(kind==='ttLink'||kind==='howLink')openLinkDetail(id);else if(kind==='box')openEntryPanel(id);}
function removeTagFromElement(kind,id,tagId){if(IS_READONLY)return;var el=getTaggedElement(kind,id);if(!el||!Array.isArray(el.tagIds))return;el.tagIds=el.tagIds.filter(function(x){return x!==tagId;});saveState();render();if(kind==='measure')openMeasureDetail(id);else if(kind==='eq')openEQDetail(id);else if(kind==='ttLink'||kind==='howLink')openLinkDetail(id);else if(kind==='box')openEntryPanel(id);}

function removeDeletedTagFromAllElements(tagId){Object.keys(B||{}).forEach(function(k){if(B[k]&&Array.isArray(B[k].tagIds))B[k].tagIds=B[k].tagIds.filter(function(id){return id!==tagId;});});(SP||[]).forEach(function(sp){if(sp&&sp.overviewCard&&Array.isArray(sp.overviewCard.tagIds))sp.overviewCard.tagIds=sp.overviewCard.tagIds.filter(function(id){return id!==tagId;});});(ttLinks||[]).forEach(function(l){if(l&&Array.isArray(l.tagIds))l.tagIds=l.tagIds.filter(function(id){return id!==tagId;});});(howLinks||[]).forEach(function(l){if(l&&Array.isArray(l.tagIds))l.tagIds=l.tagIds.filter(function(id){return id!==tagId;});});(measures||[]).forEach(function(m){if(m&&Array.isArray(m.tagIds))m.tagIds=m.tagIds.filter(function(id){return id!==tagId;});});(evalQuestions||[]).forEach(function(q){if(q&&Array.isArray(q.tagIds))q.tagIds=q.tagIds.filter(function(id){return id!==tagId;});});}
