function clearTagValidation(){setTagValidation('');}
function openTagsManager(){tagManagerDraft=JSON.parse(JSON.stringify(tags||[]));renderTagsManager();clearTagValidation();openModal('tagsModal');}
function renderTagsManager(){var el=document.getElementById('tagsList');if(!el)return;var list=tagManagerDraft||[];var html='';if(!list.length)html='<div style="color:var(--text2);font-style:italic;padding:8px 0">No tags created yet.</div>';list.forEach(function(t,i){html+='<div class="tag-manager-row"><input class="tag-short-input ro-keep-editable" id="tagShort_'+i+'" maxlength="6" value="'+escAttr(normalizeTagShortLabel(t.shortLabel||''))+'" '+(IS_READONLY?'disabled':'')+'><input class="tag-label-input ro-keep-editable" id="tagLabel_'+i+'" value="'+escAttr(t.label||'')+'" placeholder="Tag name" '+(IS_READONLY?'disabled':'')+'><input class="tag-desc-input ro-keep-editable" id="tagDesc_'+i+'" value="'+escAttr(t.description||'')+'" placeholder="Description" '+(IS_READONLY?'disabled':'')+'><button class="tag-small-btn tag-del-btn tag-edit-only" onclick="deleteTagDraft('+i+')">Delete</button></div>';});el.innerHTML=html;var add=document.getElementById('tagsAddRow');if(add)add.style.display=IS_READONLY?'none':'block';}
function _syncTagDraftFromDOM(){if(!tagManagerDraft)return;tagManagerDraft.forEach(function(t,i){var sl=document.getElementById('tagShort_'+i),lab=document.getElementById('tagLabel_'+i),desc=document.getElementById('tagDesc_'+i);if(sl)t.shortLabel=normalizeTagShortLabel(sl.value);if(lab)t.label=String(lab.value||'').trim();if(desc)t.description=String(desc.value||'').trim();});}
function addTagDraftRow(){if(IS_READONLY)return;_syncTagDraftFromDOM();if(!tagManagerDraft)tagManagerDraft=JSON.parse(JSON.stringify(tags||[]));var sl=normalizeTagShortLabel((document.getElementById('newTagShort')||{}).value);var lab=String((document.getElementById('newTagLabel')||{}).value||'').trim();var desc=String((document.getElementById('newTagDesc')||{}).value||'').trim();if(!sl&&!lab){setTagValidation('Enter a tag name or short tag before adding.');var f=document.getElementById('newTagLabel')||document.getElementById('newTagShort');if(f&&f.focus)f.focus();return;}clearTagValidation();if(!sl)sl=normalizeTagShortLabel(lab);if(!lab)lab=sl;tagManagerDraft.push({id:_genUid('tag'),shortLabel:sl,label:lab,description:desc});['newTagShort','newTagLabel','newTagDesc'].forEach(function(x){var e=document.getElementById(x);if(e)e.value='';});renderTagsManager();}
function deleteTagDraft(i){if(IS_READONLY)return;_syncTagDraftFromDOM();if(!tagManagerDraft)return;tagManagerDraft.splice(i,1);renderTagsManager();}
function saveTagsManager(){if(IS_READONLY){closeModal('tagsModal');return;}clearTagValidation();_syncTagDraftFromDOM();var oldIds=(tags||[]).map(function(t){return t.id;});var next=[];(tagManagerDraft||[]).forEach(function(t){var sl=normalizeTagShortLabel(t.shortLabel||'');var lab=String(t.label||'').trim();if(!sl&&!lab)return;if(!sl)sl=normalizeTagShortLabel(lab);if(!lab)lab=sl;next.push({id:t.id||_genUid('tag'),shortLabel:sl,label:lab,description:String(t.description||'').trim()});});var newIds={};next.forEach(function(t){newIds[t.id]=true;});oldIds.forEach(function(id){if(!newIds[id])removeDeletedTagFromAllElements(id);});tags=next;tagManagerDraft=null;saveState();closeModal('tagsModal');render();}
function cancelTagsManager(){tagManagerDraft=null;clearTagValidation();closeModal('tagsModal');}
function createTag(){addTagDraftRow();}
function saveTagRow(i){_syncTagDraftFromDOM();renderTagsManager();}
function deleteTag(tagId){if(IS_READONLY)return;if(!confirm('Delete this tag and remove it from all supported tagged elements?'))return;tags=tags.filter(function(t){return t.id!==tagId;});removeDeletedTagFromAllElements(tagId);saveState();renderTagsManager();render();}



function openMeasuresRegistry(){let html='';var cb=document.getElementById('measuresShowTags');if(cb)cb.checked=registryShowTags.measures!==false;if(!measures.length){html='<div style="color:var(--text2);font-style:italic;padding:8px 0">No measures created yet.</div>';}else{measures.forEach(m=>{const cnt=getBoxesLinkedToMeasure(m.id).length;const status=cnt?cnt+' associated':'not associated';html+='<div class="meq-reg-item"><span class="meq-reg-id">'+escHtml(measureDisplayId(m))+'</span><span class="meq-reg-title" onclick="closeModal(\'measuresRegistryModal\');openMeasureDetail(\''+m.id+'\')">'+escHtml(m.title)+(registryShowTags.measures===false?'':tagHTMLForElement(m))+'</span><span class="meq-reg-status">'+status+'</span><span class="meq-item-rm" onclick="event.stopPropagation();deleteMeasure(\''+m.id+'\')" title="Delete">✕</span></div>';});}document.getElementById('measuresRegistryList').innerHTML=html;openModal('measuresRegistryModal');}
function openEQRegistry(){let html='';var cb=document.getElementById('eqShowTags');if(cb)cb.checked=registryShowTags.eq!==false;if(!evalQuestions.length){html='<div style="color:var(--text2);font-style:italic;padding:8px 0">No evaluation questions created yet.</div>';}else{evalQuestions.forEach(q=>{const cnt=getBoxesLinkedToEQ(q.id).length;const status=cnt?cnt+' associated':'not associated';html+='<div class="meq-reg-item"><span class="meq-reg-id">'+escHtml(eqDisplayId(q))+'</span><span class="meq-reg-title" onclick="closeModal(\'eqRegistryModal\');openEQDetail(\''+q.id+'\')">'+escHtml(q.questionText)+(registryShowTags.eq===false?'':tagHTMLForElement(q))+'</span><span class="meq-reg-status">'+status+'</span><span class="meq-item-rm" onclick="event.stopPropagation();deleteEQ(\''+q.id+'\')" title="Delete">✕</span></div>';});}document.getElementById('eqRegistryList').innerHTML=html;openModal('eqRegistryModal');}
function createNewMeasureFromRegistry(){closeModal('measuresRegistryModal');createNewMeasure();}
function createNewEQFromRegistry(){closeModal('eqRegistryModal');createNewEQ();}
function toggleMeasuresListTags(){var cb=document.getElementById('measuresShowTags');registryShowTags.measures=!!(cb&&cb.checked);openMeasuresRegistry();}
function toggleEQListTags(){var cb=document.getElementById('eqShowTags');registryShowTags.eq=!!(cb&&cb.checked);openEQRegistry();}


function buildMeasuresSection(key){if(!B[key])return '';const linked=getMeasuresForBox(key);let items='';linked.forEach(m=>{items+='<div class="meq-item"><span class="meq-item-id">'+escHtml(measureDisplayId(m))+'</span><span class="meq-item-title" onclick="openMeasureDetail(\''+m.id+'\')">'+escHtml(m.title)+tagHTMLForElement(m)+'</span><span class="meq-item-rm" onclick="unlinkMeasureFromBox(\''+m.id+'\',\''+key+'\')" title="Remove association">✕</span></div>';});
let opts='<option value="">Select measure…</option>';measures.forEach(m=>{if(!linked.some(x=>x.id===m.id))opts+='<option value="'+m.id+'">'+escHtml(measureDisplayId(m))+' — '+escHtml(m.title)+'</option>';});
return '<div class="ep-section"><div class="ep-section-hdr">Measures</div>'+(items||'<div style="font-size:10px;color:var(--text2);font-style:italic;margin-bottom:4px">No measures associated with this box.</div>')+'<div class="ep-compact-row"><select class="meq-sel" id="meqMPicker">'+opts+'</select><button class="meq-abtn" onclick="addMeasureFromPicker(\''+key+'\')" title="Associate with this box">Associate measure</button><span class="meq-footer-link" onclick="closeModal(\'linkDetailModal\');openMeasuresRegistry()">Manage measures</span></div></div>';}

function buildEQSection(key){if(!B[key])return '';const linked=getEvalQuestionsForBox(key);let items='';linked.forEach(q=>{items+='<div class="meq-item"><span class="meq-item-id">'+escHtml(eqDisplayId(q))+'</span><span class="meq-item-title" onclick="openEQDetail(\''+q.id+'\')">'+escHtml(q.questionText)+tagHTMLForElement(q)+'</span><span class="meq-item-rm" onclick="unlinkEQFromBox(\''+q.id+'\',\''+key+'\')" title="Remove association">✕</span></div>';});
let opts='<option value="">Select evaluation question…</option>';evalQuestions.forEach(q=>{if(!linked.some(x=>x.id===q.id))opts+='<option value="'+q.id+'">'+escHtml(eqDisplayId(q))+' — '+escHtml(q.questionText)+'</option>';});
return '<div class="ep-section"><div class="ep-section-hdr">Evaluation Questions</div>'+(items||'<div style="font-size:10px;color:var(--text2);font-style:italic;margin-bottom:4px">No evaluation questions associated with this box.</div>')+'<div class="ep-compact-row"><select class="meq-sel" id="meqEQPicker">'+opts+'</select><button class="meq-abtn" onclick="addEQFromPicker(\''+key+'\')" title="Associate with this box">Associate question</button><span class="meq-footer-link" onclick="closeModal(\'linkDetailModal\');openEQRegistry()">Manage evaluation questions</span></div></div>';}

// ─── CHAT ───
function toggleChat(){const panel=document.getElementById('chatPanel');panel.classList.toggle('open');if(panel.classList.contains('open')){maybeProbeConnection();if(!chatMsgs.length)addChatMsg('system','Hi! I can help you chat with your DoView Board once you configure a custom AI endpoint in settings. The board still works without Board Chat. If you are using Claude or another AI system, you can put this board into the main chat and ask it to answer questions about the board or help you change it.');}}
function toggleChatSettings(){chatSettingsOpen=!chatSettingsOpen;document.getElementById('chatSettingsPane').classList.toggle('open',chatSettingsOpen);document.getElementById('chatMsgs').style.display=chatSettingsOpen?'none':'';document.getElementById('chatInputArea').style.display=chatSettingsOpen?'none':'';if(chatSettingsOpen){maybeProbeConnection();document.getElementById('setEP').value=aiSettings.endpoint||'';document.getElementById('setModel').value=aiSettings.model||'';document.getElementById('setKey').value='';}}
function addChatMsg(role,text){chatMsgs.push({role,text});const msgs=document.getElementById('chatMsgs');if(!msgs)return;const div=document.createElement('div');div.className=`chat-m ${role}`;div.innerHTML=renderMd(text);msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
function renderMd(text){return linkify(text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>')).replace(/\n/g,'<br>');}

function buildBoardStatePrompt(fullBoard,structural){let s=`You are a helpful assistant with full awareness of this DoView board: "${TITLE}".\nDOVIEW RULES: Boxes=outcome statements ending \u2026ed. STRICT RULE: NEVER use auxiliary-verb forms (were/was/is/are/have been/will be/has been) in This\u2013Then box labels \u2014 always use compact DoView outcome phrasing instead. Examples of CORRECT compact phrasing: "Predators, browsers and weeds controlled at priority sites", "Funding secured", "Risks identified early". Examples of WRONG auxiliary-verb phrasing that must be rewritten: "were controlled", "was secured", "are identified", "is in place", "have been completed". If you find yourself producing a label with were/was/is/are/have been, STOP and rewrite it in compact DoView form before emitting it. This rule applies BOTH when building new boards AND when editing existing ones \u2014 if an existing box already uses auxiliary-verb phrasing, you should rewrite it into compact form. L\u2192R=earlier\u2192later causal flow. Cols=causal stages named descriptively not generically. Column headings label the stage only \u2014 not extra boxes; if a heading reads like a missing box, rewrite it or make it a box. Vary col/row counts by real-world domain logic. No templates. Avoiding one banned shape is not enough: do not add populated pages with repeated or near-matching geometry such as 4-4-4-4 / 4-4-4-3 unless the domain genuinely requires it. Do not achieve anti-stereotype variation by overloading final/right-hand columns with many terminal outcomes; ordinary This–Then pages usually end with 1–3 page-level terminal outcomes, 4 needs a domain reason, and 5+ should be rare. Distinguish these page-level terminal outcomes from the board-level Final Outcomes page. Include assumptions/risks phrased positively. One concept per box. Multiple final outcomes allowed.\n\nBOARD-CHAT INTENT CLASSIFICATION. Before generating any actions, classify the user's request silently into ONE of these intents:\n  (1) question / explanation only \u2014 the user is asking what something means, asking the board to explain something, asking for advice or a summary, or asking "what does this board say about X?". Answer in plain language. Do NOT propose structural edits. Do NOT emit ACTION tags unless the user clearly asks for a change.\n  (2) state-only edit \u2014 setLight / setPriority / addSofar / addNote / addNote1 / addNote2 / addNote3 / setDetail / clearDetail / setBoxBorder / clearBoxBorder / setBoardInfo / setPageInfo. Emit the ACTION tag and answer briefly in past tense (e.g. "Done").\n  (3) structural edit (existing pages/boxes/columns) \u2014 addBox / removeBox / renameBox / addColumn / removeColumn / renameColumn / moveColumn / removeSubpage / addFinalOutcome / removeFinalOutcome / addHowBox / removeHowBox / renameHowBox. Emit the ACTION tag(s) and explain in FUTURE TENSE.\n  (4) blank This\u2013Then page creation \u2014 the user explicitly asked for a "blank", "starter", "empty", or "page shell" This\u2013Then page. Emit just [ACTION:addSubpage:LABEL:this_then] without populating it.\n  (5) populated This\u2013Then page creation \u2014 see below for the full populated-page rule.\n  (6) How page creation \u2014 the user explicitly asked for a How page. Emit [ACTION:addSubpage:LABEL:how]; the engine seeds 8 starter How Boxes.\n  (7) Documentation page creation \u2014 the user explicitly asked for a Documentation page. Emit [ACTION:addSubpage:LABEL:documentation].\n  (8) ambiguous page creation \u2014 the user asked to add/create/make a page but did NOT specify the page type and did NOT clearly imply a populated This\u2013Then page. DO NOT emit any ACTION tags. Instead reply with the page-type clarification question below and stop. Wait for the user's answer.\n  (9) invalid or incomplete action proposal \u2014 if you cannot generate a valid, complete action set (for example because a referenced box does not exist), explain the problem and ask the user for clarification rather than emitting partial ACTION tags.\nThe classification is invisible to the UI \u2014 you do not need to label your reply as "intent: 4" or similar. Just behave according to the classification.\n\nASK PAGE TYPE WHEN PAGE CREATION IS AMBIGUOUS. If the user asks to add/create/make a page but does NOT clearly specify the page type AND does NOT clearly imply a populated This\u2013Then page (via "full DoView", "complete DoView", "full logic", "full populated page", "populate it", "add DoView This\u2013Then boxes", "create a This\u2013Then logic for X", "add a This\u2013Then page", or "add a page and fill it in"), reply with this exact wording (or preserve it very closely) and DO NOT emit any ACTION tag:\n\n  What type of page do you want?\n  - This\u2013Then page \u2014 shows what you want to happen in the world, and what leads to what.\n  - How page \u2014 shows what is going to be done.\n  - Documentation page \u2014 holds supporting notes, explanation and basic rich-text documentation about the DoView Board.\n\nThen STOP and wait for the user's answer. Do NOT create the page and ask the question at the same time. Do NOT default ambiguous page requests to This\u2013Then. Do NOT default ambiguous page requests to Documentation. After the user answers, propose the appropriate page.\n\nExamples of ambiguous requests that REQUIRE the page-type clarification question above (no ACTION tag emitted):\n  \u2022 "add a page called leadership development"\n  \u2022 "create a new page about leadership development"\n  \u2022 "make a page for leadership development"\n  \u2022 "add leadership development as a page"\n  \u2022 "add a starter page called leadership development" (page type missing \u2014 still ask)\n\nExamples that BYPASS the clarification (do NOT ask the page-type question; go ahead with the appropriate ACTION tags):\n  \u2022 "add a This\u2013Then page called leadership development"\n  \u2022 "add a How page called leadership development"\n  \u2022 "add a Documentation page called leadership development"\n  \u2022 "add a blank This\u2013Then page called leadership development" (blank with explicit type)\n  \u2022 "add a new page called leadership development which includes a full DoView on it" (populated trigger \u2014 see populated-page examples below)\n  \u2022 "add a complete DoView page about leadership development"\n  \u2022 "create a full logic for leadership development"\n  \u2022 "add a full populated page about leadership development"\n  \u2022 "make a page on leadership development with the full DoView logic"\n\n`;if(structural){s+=`\nFULL DOVIEW METHODOLOGY (apply when creating/restructuring content):\n- Extract all outcomes or steps to outcomes from the domain\n- Write as outcome statements using phrasing that tends to end with \u2026ed\n- STRICT: Do NOT write box labels with auxiliary-verb forms such as were / was / is / are / have been / will be / has been. Use compact DoView outcome phrasing instead. If you accidentally produce auxiliary-verb phrasing, REWRITE the label into compact form before emitting it. This applies both to newly created boxes and to any boxes you are editing or renaming.\n- Map This\u2192Then relationships: if achieving A tends to lead to B, A goes left of B\n- Keep boxes tight: one concept per box\n- World-centric: include external assumptions and risks, phrased positively\n- Not only quantifiable: do not restrict boxes to measurable items only\n- Avoid siloing: a left-side box can influence multiple right-side boxes\n- Columns = causal stages, named descriptively for the specific domain\n- Column headings label the causal stage only; they are not extra boxes. If a heading reads like a missing outcome, step, action, or condition, rewrite it or make it a box\n- Vary box counts: the number of boxes per column is determined by how many genuinely distinct outcomes occur at that causal stage in the real world, not by a template\n- Vary column counts: different subpages have different numbers of causal stages\n- Use qualifiers: adequate / sufficient / high-quality where appropriate\n- Final column boxes are bold (handled by engine)\n- When building or generating new boards, do not pre-assign non-neutral Traffic Lights or priorities unless the user explicitly asks for them. Leave Traffic Lights grey/unset and priorities empty by default.\n- When adding a subpage, always use [ACTION:addSubpage:LABEL:PAGE_TYPE] where PAGE_TYPE is this_then, how, or documentation. If the user has not specified a page type AND has not clearly implied a populated This\u2013Then page, ask the page-type clarification question above BEFORE creating any page \u2014 do not guess a default. The engine auto-assigns colors \u2014 NEVER ask the user to choose colors.\n- POPULATED vs BLANK This\u2013Then page rule. When the user asks the board chat to add a NEW This\u2013Then page about a topic AND has either explicitly named the type OR clearly triggered the populated-page behavior, this is a POPULATED-page request. Trigger phrasings include: "add a This\u2013Then page about X", "add a new This\u2013Then page about X", "populate it", "add DoView This\u2013Then boxes", "create a This\u2013Then logic for X", "add a page and fill it in", AND any phrasing using "full DoView", "complete DoView", "full logic", or "full populated page" \u2014 for example "add a new page called X which includes a full DoView on it", "add a complete DoView page about X", "create a full logic for X", "add a full populated page about X", "make a page on X with the full DoView logic". You MUST emit, in ONE response, the FULL set of action tags so the engine can apply the populated page in a single OK confirmation step:\n  * one [ACTION:addSubpage:LABEL:this_then]\n  * AT LEAST 3 columns total. The engine creates the new page with one default first column called "First Stage". Use [ACTION:renameColumn:NEW_PAGE_ID:0:NEW_HEADING] to rename it (column headings name causal stages \u2014 not generic "Stage 1, Stage 2") and emit AT LEAST 2 more [ACTION:addColumn:NEW_PAGE_ID:COLUMN_INDEX:HEADING] tags so the page has at least 3 columns total\n  * AT LEAST 6 boxes total spread across those columns via [ACTION:addBox:NEW_PAGE_ID:COLUMN_INDEX:LABEL] tags, using compact DoView outcome phrasing (no auxiliary-verb forms)\n  * Boxes flow left-to-right in plausible This\u2192Then causal order. Final/right-hand boxes represent later or higher-level outcomes for the page.\n- DOMAIN-SHAPED PAGE STRUCTURE. When you create a populated This\u2013Then page, the number of columns and the number of boxes in each column MUST reflect the actual causal structure of the domain being modelled. Do NOT use an arbitrary template such as 3 columns with 2 or 3 boxes each. Use as many causal stages as are genuinely needed for the domain. Vary the number of boxes per column according to how many distinct outcomes, conditions, or enabling steps exist at that stage. Column headings must name real causal stages \u2014 not generic labels such as "Stage 1", "Stage 2", "Inputs", "Activities", "Outputs" \u2014 unless those words are genuinely the best domain-specific headings. The "at least 3 columns and at least 6 boxes" rule above is a FLOOR, not a target or a template: a populated page about a domain that naturally has 4, 5, or more causal stages should have 4, 5, or more columns; if some columns naturally have 1 box and others naturally have 4, mirror that real-world variation. Mechanical "3 columns x 2 boxes" or "3 columns x 3 boxes" templates will be rejected by the engine.\n- Explicit type wins. If the user explicitly requests a How Page or Documentation Page, respect that explicit page type rather than forcing This\u2013Then \u2014 even if the message also contains "full DoView" or similar (e.g. "make a Documentation page with a full DoView" \u2192 still create a Documentation page, do NOT force This\u2013Then).\n- Predicting NEW_PAGE_ID for the addColumn / addBox / renameColumn tags: the engine assigns the new page id as the next unused pN value. Look at the FULL board state above to identify existing SP ids (p1, p2, p3, \u2026) and use the next free id that is not already present. Emit ALL the addColumn, renameColumn and addBox tags in the same response, referencing that predicted NEW_PAGE_ID. The engine applies addSubpage first, so by the time the addColumn / addBox tags run, the new page exists with that id.\n- A one-box placeholder (just [ACTION:addSubpage:LABEL:this_then] with no addColumn/addBox tags) is NOT acceptable for a populated-page request. The engine will reject the change and ask you/the user to retry. Always emit the full populated structure in one response.\n- BLANK / starter pages: only when the user EXPLICITLY asks for a "blank", "starter", "empty", or "page shell" page may you emit just [ACTION:addSubpage:LABEL:this_then] without populating it. In that case the engine creates a blank starter page as before. If the user has stated a populated trigger (full DoView, full logic, populate it, etc.), treat it as POPULATED.\n- Worked example. Suppose the current board already has p1, p2, p3 and the user says "add a new page called staff retention which includes a full DoView on it". Then in ONE response, emit:\n    [ACTION:addSubpage:Staff retention:this_then]\n    [ACTION:renameColumn:p4:0:Causes addressed]\n    [ACTION:addColumn:p4:1:Conditions established]\n    [ACTION:addColumn:p4:2:Outcomes secured]\n    [ACTION:addBox:p4:0:Pay and conditions reviewed]\n    [ACTION:addBox:p4:0:Workload pressures eased]\n    [ACTION:addBox:p4:1:Career development pathways in place]\n    [ACTION:addBox:p4:1:Effective management strengthened]\n    [ACTION:addBox:p4:2:Voluntary turnover reduced]\n    [ACTION:addBox:p4:2:Workforce capability retained]\n  Use future tense ("a new This\u2013Then page will be added with three columns and six boxes\u2026") because the user must confirm before the change takes effect. Note that 3 columns and 6 boxes is the MINIMUM \u2014 if staff retention genuinely needs more causal stages or more boxes per column, use them.\n`;}if(fullBoard||currentPage==='overview'||currentPage==='final'){s+=`\nFull board state:\n`;SP.forEach(sp=>{s+=`\n[${sp.label} (id:${sp.id}, type:${sp.pageType||'this_then'})]\n`;if(sp.pageType==='how'&&sp.howBoxes){sp.howBoxes.forEach(hb=>{const k=`${sp.id}-${hb.id}`;const b=B[k];if(!b)return;const pri=b.priority?` [Pri:${b.priority}]`:'';const sf=b.entries.filter(e=>e.type==='sofar').map(e=>e.text).join('; ');const nt=b.entries.filter(e=>e.type==='note').map(e=>e.text).join('; ');const n1=b.entries.filter(e=>e.type==='note1').map(e=>e.text).join('; ');const n2=b.entries.filter(e=>e.type==='note2').map(e=>e.text).join('; ');const n3=b.entries.filter(e=>e.type==='note3').map(e=>e.text).join('; ');const dt=b.detailText||'';const bc=b.borderColor||'';s+=`    ${k} | ${b.light.toUpperCase()}${pri}: ${b.label}${sf?' \u2014 Notes 1: '+sf:''}${nt?' \u2014 Notes: '+nt:''}${n1?' \u2014 Notes1: '+n1:''}${n2?' \u2014 Notes2: '+n2:''}${n3?' \u2014 Notes3: '+n3:''}${dt?' \u2014 Detail: '+dt:''}${bc?' \u2014 Border: '+bc:''}\n`;});}else{sp.cols.forEach((col,ci)=>{s+=`  Column ${ci+1}: "${col.h}"\n`;col.boxes.forEach((_,bi)=>{const k=`${sp.id}-c${ci}-b${bi}`;const b=B[k];if(!b)return;const pri=b.priority?` [Pri:${b.priority}]`:'';const sf=b.entries.filter(e=>e.type==='sofar').map(e=>e.text).join('; ');const nt=b.entries.filter(e=>e.type==='note').map(e=>e.text).join('; ');const n1=b.entries.filter(e=>e.type==='note1').map(e=>e.text).join('; ');const n2=b.entries.filter(e=>e.type==='note2').map(e=>e.text).join('; ');const n3=b.entries.filter(e=>e.type==='note3').map(e=>e.text).join('; ');const dt=b.detailText||'';const bc=b.borderColor||'';s+=`    ${k} | ${b.light.toUpperCase()}${pri}: ${b.label}${sf?' \u2014 Notes 1: '+sf:''}${nt?' \u2014 Notes: '+nt:''}${n1?' \u2014 Notes1: '+n1:''}${n2?' \u2014 Notes2: '+n2:''}${n3?' \u2014 Notes3: '+n3:''}${dt?' \u2014 Detail: '+dt:''}${bc?' \ nds, use 0-based COLUMN_INDEX (Column 1 = index 0, Column 2 = index 1, etc.).\nIMPORTANT: ALWAYS include ACTION tags directly in your response for ANY board change. NEVER describe a change without including the ACTION tag. The JavaScript handles confirmation automatically for structural changes. EXCEPTION: if the user is only asking a question or asking for an explanation, do NOT emit ACTION tags. If the user's page-creation request is ambiguous (no page type specified, no populated trigger), do NOT emit any ACTION tag \u2014 instead ask the page-type clarification question and wait.\nIMPORTANT: For structural changes (addBox, removeBox, addColumn, etc.), use FUTURE TENSE in your explanation because the user must confirm before the change takes effect. Say "A new box will be added" NOT "A new box has been added". Say "This column will be removed" NOT "This column has been removed". The confirmation dialog appears automatically \u2014 do NOT ask for permission in plain text.\n\nAvailable commands:\nState changes (execute immediately \u2014 use past tense: "Done", "Changed", etc.):\n  [ACTION:setLight:BOX_ID:COLOR] \u2014 set traffic light (green/greenYellow/yellow/yellowRed/red/grey)\n  [ACTION:setAllLights:COLOR] \u2014 set ALL boxes to a color\n  [ACTION:setSubpageLights:SUBPAGE_ID:COLOR] \u2014 set all boxes on a subpage\n  [ACTION:addSofar:BOX_ID:TEXT] \u2014 append a Notes 1 entry\n  [ACTION:addNote:BOX_ID:TEXT] \u2014 append a My Notes entry\n  [ACTION:addNote1:BOX_ID:TEXT] \u2014 append a Notes 1 entry\n  [ACTION:addNote2:BOX_ID:TEXT] \u2014 append a Notes 2 entry\n  [ACTION:addNote3:BOX_ID:TEXT] \u2014 append a Notes 3 entry\n  [ACTION:setPriority:BOX_ID:PRIORITY] \u2014 set priority (A/B/C/D/E/BAU or empty to clear)\n  [ACTION:clearEntries:BOX_ID:TYPE] \u2014 clear entries (sofar/note/note1/note2/note3/all)\n  [ACTION:setDetail:BOX_ID:TEXT] \u2014 set detail text box below a box (always visible on board)\n  [ACTION:clearDetail:BOX_ID] \u2014 remove detail text box\n  [ACTION:setBoxBorder:BOX_ID:COLOR] \u2014 set custom border color (2px, e.g. red, #ef4444)\n  [ACTION:clearBoxBorder:BOX_ID] \u2014 reset border to default\n  [ACTION:setSubpageBorders:SUBPAGE_ID:COLOR] \u2014 set all box borders on a subpage\n  [ACTION:clearSubpageBorders:SUBPAGE_ID] \u2014 reset all borders on a subpage\n  [ACTION:setBoardInfo:TEXT] \u2014 replace Board info content with TEXT\n  [ACTION:setPageInfo:PAGE_ID:TEXT] \u2014 replace Page info for PAGE_ID (e.g. p1, p2, final, overview) with TEXT\n\nStructural changes (user confirms before executing \u2014 use FUTURE TENSE in explanation):\n  [ACTION:addBox:SUBPAGE_ID:COLUMN_INDEX:LABEL]\n  [ACTION:removeBox:BOX_ID]\n  [ACTION:renameBox:BOX_ID:NEW_LABEL]\n  [ACTION:addColumn:SUBPAGE_ID:COLUMN_INDEX:HEADING]\n  [ACTION:removeColumn:SUBPAGE_ID:COLUMN_INDEX]\n  [ACTION:renameColumn:SUBPAGE_ID:COLUMN_INDEX:NEW_HEADING]\n  [ACTION:moveColumn:SUBPAGE_ID:FROM_INDEX:TO_INDEX] \u2014 move a column from one position to another (0-based indexes)\n  [ACTION:addSubpage:LABEL:PAGE_TYPE] \u2014 adds subpage. PAGE_TYPE is this_then, how, or documentation (default: this_then). When the user asks to add a page without a clear type and without a populated trigger, ASK the page-type clarification question before emitting this command.\n  [ACTION:removeSubpage:SUBPAGE_ID]\n  [ACTION:addFinalOutcome:LABEL]\n  [ACTION:removeFinalOutcome:INDEX]\n\nHow Page commands (structural \u2014 user confirms):\n  [ACTION:addHowBox:SUBPAGE_ID:LABEL] \u2014 add a How Box to a How page\n  [ACTION:removeHowBox:SUBPAGE_ID:HOW_ID] \u2014 remove a How Box (e.g. H001)\n  [ACTION:renameHowBox:SUBPAGE_ID:HOW_ID:NEW_LABEL] \u2014 rename a How Box\n\nThis\u2013Then Link commands (state changes \u2014 execute immediately):\n  [ACTION:addTTLink:FROM_BOX_ID:TO_BOX_ID] \u2014 add a This\u2013Then link between two This\u2013Then boxes (same or cross-page). Max one link per direction between a pair.\n  [ACTION:removeTTLink:LINK_ID] \u2014 remove a BPAGE_ID-HXXX (e.g. p2-H001). State commands (setLight, addSofar, etc.) work on How Boxes using these IDs.\n- If the user is asking a question, asking for an explanation, asking "what does this board say about\u2026", asking for advice, or asking for a summary, answer in plain language. Do NOT propose structural edits unless the user clearly asks for a change.`;return s;}

function buildJumpToPageSection(key){if(!B[key])return '';const isTT=isTTBox(key);const isHow=isHowBox(key);const isFO=!!key.match(/^final-b\d+$/);if(!isTT&&!isHow&&!isFO)return '';const box=B[key];const cur=box.jumpToPage||'';const currentPageId=getSourcePageId(key)||'';let opts='<option value="">None</option>';const allPages=[{id:'overview',label:'Overview'},{id:'final',label:'Final Outcomes'},...SP.map(s=>({id:s.id,label:s.label}))];allPages.forEach(p=>{const isCurrent=p.id===currentPageId;const selected=cur===p.id&&!isCurrent;const label=p.label+(isCurrent?' (current page)':'');opts+='<option value="'+p.id+'"'+(selected?' selected':'')+(isCurrent?' disabled':'')+'>'+escHtml(label)+'</option>';});return '<div class="meq-section"><div class="meq-hdr">Jump to a page</div><div class="how-link-add"><select class="how-link-sel" id="jumpPageSel" style="flex:1">'+opts+'</select><button class="ep-sbtn" onclick="setJumpToPage(\''+key+'\')">Add jump</button>'+(cur?' <button class="ep-sbtn ep-del" onclick="clearJumpToPage(\''+key+'\')">Remove</button>':'')+'</div></div>';}

function buildTTLinksSection(key){if(!isTTBox(key))return '';const box=B[key];if(!box)return '';const links=getTTLinksTouching(key);let rows='';links.forEach(l=>{const otherKey=l.from===key?l.to:l.from;const otherBox=B[otherKey];if(!otherBox)return;const otherPage=getBoxPage(otherKey);const pageName=otherPage?otherPage.label:'';const fromLabel=l.from===key?box.label:otherBox.label;const toLabel=l.to===key?box.label:otherBox.label;rows+=`<div class="tt-link-row"><span class="tt-link-box" title="${escAttr(fromLabel)}">${escHtml(fromLabel)}</span><span class="tt-link-arrow" onclick="flipTTLink('${l.id}')" title="Click to reverse direction">\u2192</span><span class="tt-link-box" title="${escAttr(toLabel)}">${escHtml(toLabel)}</span><span class="tt-link-pg">(${escHtml(pageName)})</span><span class="link-info-btn" onclick="event.stopPropagation();openLinkDetail('${l.id}')" title="Link details">\u2139</span><span class="tt-link-rm" onclick="removeTTLink('${l.id}')">\u2715</span></div>`;});const picker=buildTTLinkPicker(key);return `<div class="tt-link-section"><div class="tt-link-hdr">Link to another This Then box</div>${rows||'<div style="font-size:10.5px;color:var(--text2);margin-bottom:6px;font-style:italic">No links yet</div>'}${picker}</div>`;}

function doGlobalSearch(){var q=document.getElementById('globalSearchInput').value.trim().toLowerCase();var container=document.getElementById('globalSearchResults');if(!q||q.length<2){container.innerHTML='<div style="color:var(--text2);font-style:italic;padding:8px">Type at least 2 characters.</div>';return;}var results=[];var esc=function(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;};var snippet=function(text,term){var lower=text.toLowerCase();var idx=lower.indexOf(term);if(idx<0)return text.substring(0,80)+(text.length>80?'…':'');var start=Math.max(0,idx-30);var end=Math.min(text.length,idx+term.length+50);var s=(start>0?'…':'')+text.substring(start,end)+(end<text.length?'…':'');return s;};
// Search page titles
SP.forEach(function(sp){if(sp.label.toLowerCase().indexOf(q)>=0){results.push({type:'Page title',page:sp.label,id:'',snippet:sp.label,action:'navTo(\''+sp.id+'\')'});}});
if('final outcomes'.indexOf(q)>=0){results.push({type:'Page title',page:'Final Outcomes',id:'',snippet:'Final Outcomes',action:'navTo(\'final\')'});}
// Search box titles and main text (This–Then)
SP.forEach(function(sp){if(sp.pageType==='documentation')return;if(sp.pageType==='how'&&sp.howBoxes){sp.howBoxes.forEach(function(hb){var k=sp.id+'-'+hb.id;var bd=B[k];if(!bd)return;var did=howBoxDisplayId(hb);if(bd.label.toLowerCase().indexOf(q)>=0){results.push({type:'How Box',page:sp.label,id:did,snippet:bd.label,action:'searchNavBox(\''+sp.id+'\',\''+k+'\')'});}if(bd.detailText&&bd.detailText.toLowerCase().indexOf(q)>=0){results.push({type:'How Box Display Text',page:sp.label,id:did,snippet:snippet(bd.detailText,q),action:'searchNavBox(\''+sp.id+'\',\''+k+'\')'});}});return;}sp.cols.forEach(function(col,ci){col.boxes.forEach(function(_,bi){var k=sp.id+'-c'+ci+'-b'+bi;var bd=B[k];if(!bd)return;if(bd.label.toLowerCase().indexOf(q)>=0){results.push({type:'This–Then Box',page:sp.label,id:'',snippet:bd.label,action:'searchNavBox(\''+sp.id+'\',\''+k+'\')'});}if(bd.detailText&&bd.detailText.toLowerCase().indexOf(q)>=0){results.push({type:'Box Display Text',page:sp.label,id:'',snippet:snippet(bd.detailText,q),action:'searchNavBox(\''+sp.id+'\',\''+k+'\')'});}});});});
// Final outcomes
FO_DATA.forEach(function(label,i){var k='final-b'+i;var bd=B[k];if(!bd)return;if(label.toLowerCase().indexOf(q)>=0){results.push({type:'Final Outcome',page:'Final Outcomes',id:'',snippet:label,action:'searchNavBox(\'final\',\''+k+'\')'});}if(bd.detailText&&bd.detailText.toLowerCase().indexOf(q)>=0){results.push({type:'Final Outcome Display Text',page:'Final Outcomes',id:'',snippet:snippet(bd.detailText,q),action:'searchNavBox(\'final\',\''+k+'\')'});}});
// Measures
measures.forEach(function(m){var did=measureDisplayId(m);if(m.title.toLowerCase().indexOf(q)>=0){results.push({type:'Measure',page:'',id:did,snippet:m.title,action:'closeModal(\'globalSearchModal\');openMeasureDetail(\''+m.id+'\')'});}if(m.mainText&&m.mainText.toLowerCase().indexOf(q)>=0){results.push({type:'Measure text',page:'',id:did,snippet:snippet(m.mainText,q),action:'closeModal(\'globalSearchModal\');openMeasureDetail(\''+m.id+'\')'});}});
// Evaluation Questions
evalQuestions.forEach(function(eq){var did=eqDisplayId(eq);if(eq.questionText.toLowerCase().indexOf(q)>=0){results.push({type:'Eval Question',page:'',id:did,snippet:eq.questionText,action:'closeModal(\'globalSearchModal\');openEQDetail(\''+eq.id+'\')'});}if(eq.mainText&&eq.mainText.toLowerCase().indexOf(q)>=0){results.push({type:'EQ text',page:'',id:did,snippet:snippet(eq.mainText,q),action:'closeModal(\'globalSearchModal\');openEQDetail(\''+eq.id+'\')'});}});
// Documentation page content
SP.forEach(function(sp){if(sp.pageType!=='documentation')return;var dc=docContent[sp.id]||'';var plain=dc.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();if(plain.toLowerCase().indexOf(q)>=0){results.push({type:'Documentation',page:sp.label,id:'',snippet:snippet(plain,q),action:'closeModal(\'globalSearchModal\');navTo(\''+sp.id+'\')'});}});
if(!results.length){container.innerHTML='<div style="color:var(--text2);font-style:italic;padding:8px">No results found.</div>';return;}
container.innerHTML=results.slice(0,50).map(function(r){return '<div style="padding:6px 8px;border-bottom:1px solid #f1f5f9;cursor:pointer;border-radius:4px" onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'transparent\'" onclick="'+r.action+'"><div style="display:flex;gap:8px;align-items:center;margin-bottom:2px"><span style="font-size:10px;font-weight:600;color:#F5A623;text-transform:uppercase">'+esc(r.type)+'</span>'+(r.id?'<span style="font-size:10px;color:var(--text2);font-weight:600">'+esc(r.id)+'</span>':'')+(r.page?'<span style="font-size:10px;color:var(--text2)">'+esc(r.page)+'</span>':'')+'</div><div style="color:#1e293b;font-size:11.5px;line-height:1.4">'+esc(r.snippet)+'</div></div>';}).join('');}
function searchNavBox(pageId,boxKey){closeModal('globalSearchModal');navTo(pageId);setTimeout(function(){clickBox(boxKey);var el=document.getElementById('bx-'+boxKey);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},100);}

// ─── LINK DETAILS & REGISTRY ───
function findLink(linkId){var idx=getRuntimeLinkIndex();var l=idx.ttById[linkId];if(l)return{link:l,type:'this_then'};l=idx.howById[linkId];if(l)return{link:l,type:'how'};return null;}
function ensureLinkFields(l){if(typeof l.mainText!=='string')l.mainText='';if(typeof l.notes1!=='string')l.notes1='';if(typeof l.notes2!=='string')l.notes2='';if(typeof l.notes3!=='string')l.notes3='';}
// Measures and Evaluation Questions can be attached to This–Then links only (not How links at this stage). Arrays default to [] for older saved boards.
function ensureTTLinkMEQFields(l){if(!Array.isArray(l.measures))l.measures=[];if(!Array.isArray(l.evalQuestions))l.evalQuestions=[];}
function linkDisplayPreviewHTML(linkId,l){var text=(l&&typeof l.mainText==='string')?l.mainText:'';var codeStyle=linkDisplayCodeStyleActive();var preview=text.trim()?displayTextForView(text,codeStyle,true):'<span class="box-display-empty">No display text</span>';var editBtn=IS_READONLY?'':'<button class="ep-sbtn" style="margin-top:7px" onclick="openLinkDisplayTextPopup(\''+linkId+'\')">Edit Display Text</button>';return '<div class="ep-section"><div class="ep-section-hdr">Display Text</div><div class="box-display-preview'+(codeStyle?' display-code-style':'')+(IS_READONLY?'':' editable')+'" id="linkDMainPreview"'+(IS_READONLY?'':' onclick="openLinkDisplayTextPopup(\''+linkId+'\')" title="Click to edit Display Text"')+'>'+preview+'</div>'+editBtn+'</div>';}
function openLinkDisplayTextPopup(linkId){if(IS_READONLY)return;var found=findLink(linkId);if(!found)return;var l=found.link;ensureLinkFields(l);var modal=document.getElementById('linkDisplayTextModal');var ta=document.getElementById('linkDisplayTextTa');if(!modal||!ta)return;modal.dataset.linkId=linkId;ta.value=l.mainText||'';setDisplayTextNoticeAndStyle('linkDisplayTextTa','linkDisplayTextNotice',linkDisplayCodeStyleActive());openModal('linkDisplayTextModal');setTimeout(function(){try{ta.focus();var len=ta.value.length;ta.setSelectionRange(len,len);}catch(e){}},40);}
function saveLinkDisplayTextPopup(){if(IS_READONLY){closeModal('linkDisplayTextModal');return;}var modal=document.getElementById('linkDisplayTextModal');var linkId=modal&&modal.dataset?modal.dataset.linkId:'';var found=findLink(linkId);if(!found){closeModal('linkDisplayTextModal');return;}var l=found.link;ensureLinkFields(l);var ta=document.getElementById('linkDisplayTextTa');l.mainText=ta?(ta.value||''):'';saveState();closeModal('linkDisplayTextModal');render();var preview=document.getElementById('linkDMainPreview');if(preview){var codeStyle=linkDisplayCodeStyleActive();preview.classList.toggle('display-code-style',codeStyle);preview.innerHTML=l.mainText.trim()?displayTextForView(l.mainText,codeStyle,true):'<span class="box-display-empty">No display text</span>';}}
function buildLinkMeasuresSection(linkId){var found=findLink(linkId);if(!found||found.type!=='this_then')return '';var l=found.link;ensureTTLinkMEQFields(l);var linked=l.measures||[];var items='';linked.forEach(function(mId){var m=getMeasure(mId);if(!m)return;items+='<div class="meq-item"><span class="meq-item-id">'+escHtml(measureDisplayId(m))+'</span><span class="meq-item-title" onclick="closeModal(\'linkDetailModal\');openMeasureDetail(\''+m.id+'\')">'+escHtml(m.title)+tagHTMLForElement(m)+'</span><span class="meq-item-rm" onclick="unlinkMeasureFromTTLink(\''+m.id+'\',\''+linkId+'\')" title="Remove association">\u2715</span></div>';});var opts='<option value="">Select a measure\u2026</option>';measures.forEach(function(m){if(!linked.includes(m.id))opts+='<option value="'+m.id+'">'+escHtml(measureDisplayId(m))+' \u2014 '+escHtml(m.title)+'</option>';});return '<div class="ep-section"><div class="ep-section-hdr">Measures</div>'+(items||'<div style="font-size:10px;color:var(--text2);font-style:italic;margin-bottom:4px">No measures associated with this link.</div>')+'<div class="ep-compact-row"><select class="meq-sel" id="linkMPicker">'+opts+'</select><button class="meq-abtn" onclick="addMeasureFromLinkPicker(\''+linkId+'\')" title="Associate with this structural link">Associate measure</button><span class="meq-footer-link" onclick="closeModal(\'linkDetailModal\');openMeasuresRegistry()">Manage measures</span></div></div>';}
function buildLinkEQSection(linkId){var found=findLink(linkId);if(!found||found.type!=='this_then')return '';var l=found.link;ensureTTLinkMEQFields(l);var linked=l.evalQuestions||[];var items='';linked.forEach(function(eqId){var q=getEQ(eqId);if(!q)return;items+='<div class="meq-item"><span class="meq-item-id">'+escHtml(eqDisplayId(q))+'</span><span class="meq-item-title" onclick="closeModal(\'linkDetailModal\');openEQDetail(\''+q.id+'\')">'+escHtml(q.questionText)+tagHTMLForElement(q)+'</span><span class="meq-item-rm" onclick="unlinkEQFromTTLink(\''+q.id+'\',\''+linkId+'\')" title="Remove association">\u2715</span></div>';});var opts='<option value="">Select an evaluation question\u2026</option>';evalQuestions.forEach(function(q){if(!linked.includes(q.id))opts+='<option value="'+q.id+'">'+escHtml(eqDisplayId(q))+' \u2014 '+escHtml(q.questionText)+'</option>';});return '<div class="ep-section"><div class="ep-section-hdr">Evaluation Questions</div>'+(items||'<div style="font-size:10px;color:var(--text2);font-style:italic;margin-bottom:4px">No evaluation questions associated with this link.</div>')+'<div class="ep-compact-row"><select class="meq-sel" id="linkEQPicker">'+opts+'</select><button class="meq-abtn" onclick="addEQFromLinkPicker(\''+linkId+'\')" title="Associate with this structural link">Associate question</button><span class="meq-footer-link" onclick="closeModal(\'linkDetailModal\');openEQRegistry()">Manage evaluation questions</span></div></div>';}
function _linkDetailBoxLine(key,otherKey,contextPageId){var b=B[key];if(!b)return escHtml(key);var pg=getBoxPage(key);var otherPg=otherKey?getBoxPage(otherKey):null;var showPage=false;if(pg){if(otherPg&&pg.id!==otherPg.id)showPage=true;if(contextPageId&&pg.id===contextPageId)showPage=false;if(otherPg&&pg.id===otherPg.id)showPage=false;}var pgName=showPage&&pg?pg.label:'';return '<span class="link-detail-box" onclick="closeModal(\'linkDetailModal\');navToBox(\''+key+'\')">'+escHtml(b.label)+'</span>'+(pgName?' <span style="color:var(--text2);font-size:10px">(Page: '+escHtml(pgName)+')</span>':'');}
function _linkRelationshipHTML(l,foundType){var rel=foundType==='this_then'?ttPolarityRel(l):(_storedHowLinkClass(l)==='lateral'?'relates to':(_storedHowLinkClass(l)==='downward'?'is above':'is below'));var relHtml=(foundType==='this_then'&&ttLinkPolarity(l)==='negative')?'<b class="tt-rel-neg">'+escHtml(rel)+'</b>':'<b>'+escHtml(rel)+'</b>';return _linkDetailBoxLine(l.from,l.to,currentPage)+' '+relHtml+' '+_linkDetailBoxLine(l.to,l.from,currentPage);}
function linkTrafficControlHTML(linkId,l){var state=normalizeTrafficLightValue(l.light);var split=tlSplitClass(state);var cls='link-detail-tl'+(state?'':' tl-empty')+(split?' '+split:'');var bg=state?tlColor(state):'#fff';var title=state?('Traffic light: '+tlLabel(state)):'Traffic light unset';return '<div class="link-detail-top"><button type="button" class="'+cls+'" id="linkDTraffic" style="background:'+bg+'" title="'+escAttr(title)+'" onclick="openLinkTLChooser(event,\''+linkId+'\')" '+(IS_READONLY?'disabled':'')+'></button><span class="link-detail-tl-label">'+escHtml(title)+'</span></div>';}
function openLinkTLChooser(ev,linkId){if(IS_READONLY){if(ev){ev.stopPropagation();ev.preventDefault();}return;}if(ev){ev.stopPropagation();ev.preventDefault();}closeBoxChooser();var found=findLink(linkId);if(!found||found.type!=='this_then')return;var l=found.link;var anchor=ev&&ev.currentTarget?ev.currentTarget:document.getElementById('linkDTraffic');if(!anchor)return;var div=document.createElement('div');div.id='boxChooser';div.className='box-chooser';var cur=normalizeTrafficLightValue(l.light);var states=['','green','greenYellow','yellow','yellowRed','red','grey'];var optsHtml=states.map(function(t){var state=normalizeTrafficLightValue(t);var act=cur===state?' opt-active':'';var split=tlSplitClass(state);var cls='tl-opt'+(state?'':' tl-empty')+act+(split?' '+split:'');var bg=state?tlColor(state):'#fff';return '<div class="'+cls+'" style="background:'+bg+'" title="'+(state?tlLabel(state):'Unset')+'" onclick="event.stopPropagation();setLinkTL(\''+linkId+'\',\''+state+'\')"></div>';}).join('');div.innerHTML='<div class="box-chooser-hdr">Traffic light</div><div class="box-chooser-row">'+optsHtml+'</div>';document.body.appendChild(div);var ar=anchor.getBoundingClientRect();div.style.position='fixed';div.style.left=Math.min(window.innerWidth-180,Math.max(8,ar.left+18))+'px';div.style.top=Math.min(window.innerHeight-80,Math.max(8,ar.top+18))+'px';div.style.zIndex='3000';}
function setLinkTL(linkId,state){if(IS_READONLY)return;var found=findLink(linkId);if(!found||found.type!=='this_then')return;var l=found.link;var next=normalizeTrafficLightValue(state);if(normalizeTrafficLightValue(l.light)===next){closeBoxChooser();return;}takeSnapshot();l.light=next;saveState();closeBoxChooser();render();openLinkDetail(linkId);}
function openLinkDetail(linkId){var found=findLink(linkId);if(!found)return;var l=found.link;ensureLinkFields(l);if(found.type==='this_then'){ensureTTLinkMEQFields(l);l.light=normalizeTrafficLightValue(l.light);if(!Array.isArray(l.tagIds))l.tagIds=[];}var modal=document.getElementById('linkDetailModal');var title=document.getElementById('linkDetailTitle');var content=document.getElementById('linkDetailContent');if(!modal||!title||!content)return;modal.dataset.linkId=linkId;title.textContent=(found.type==='this_then'?'This–Then Link':'How Link');var linkTop=found.type==='this_then'?linkTrafficControlHTML(linkId,l):'';var tagSection=found.type==='this_then'?buildTagAssignmentSection('ttLink',linkId,l):'';var displaySection=found.type==='this_then'?linkDisplayPreviewHTML(linkId,l):'';var pol='';if(found.type==='this_then'){var cur=(l.polarity==='negative')?'negative':'positive';pol='<div class="ep-section"><div class="ep-section-hdr">This–Then polarity</div><select class="meq-sel" id="linkDPolarity"><option value="positive" '+(cur==='positive'?'selected':'')+'>Positive — results in / increases</option><option value="negative" '+(cur==='negative'?'selected':'')+'>Negative — reduces / prevents</option></select></div>';}
var html='<div class="ep-section"><div class="ep-section-hdr">Relationship</div><div style="font-size:12px;line-height:1.5">'+_linkRelationshipHTML(l,found.type)+'</div></div>'
+linkTop
+tagSection
+pol
+displaySection
+'<div class="ep-section"><div class="ep-section-hdr">Notes</div>'
+'<textarea class="ep-ta" id="linkDN1" placeholder="Notes 1">'+escHtml(l.notes1||'')+'</textarea>'
+'<textarea class="ep-ta" id="linkDN2" placeholder="Notes 2">'+escHtml(l.notes2||'')+'</textarea>'
+'<textarea class="ep-ta" id="linkDN3" placeholder="Notes 3">'+escHtml(l.notes3||'')+'</textarea></div>'
+buildLinkMeasuresSection(linkId)+buildLinkEQSection(linkId)
+'<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:10px"><button class="ep-sbtn ep-del" onclick="deleteLinkFromDetail()">Delete link</button></div>';content.innerHTML=html;openModal('linkDetailModal');}
function deleteLinkFromDetail(){if(IS_READONLY){closeModal('linkDetailModal');return;}var modal=document.getElementById('linkDetailModal');var linkId=modal&&modal.dataset?modal.dataset.linkId:'';var found=findLink(linkId);if(!found)return;if(!confirm('Delete this link?'))return;takeSnapshot();if(found.type==='this_then')ttLinks=ttLinks.filter(function(x){return x.id!==linkId;});else howLinks=howLinks.filter(function(x){return x.id!==linkId;});markRuntimeLinkIndexDirty();saveState();closeModal('linkDetailModal');render();}
function linkMeasureToTTLink(mId,linkId){if(IS_READONLY)return;var found=findLink(linkId);if(!found||found.type!=='this_then')return;var l=found.link;ensureTTLinkMEQFields(l);if(!l.measures.includes(mId))l.measures.push(mId);saveState();openLinkDetail(linkId);}
function unlinkMeasureFromTTLink(mId,linkId){if(IS_READONLY)return;var found=findLink(linkId);if(!found||found.type!=='this_then')return;var l=found.link;if(!l.measures)return;l.measures=l.measures.filter(function(id){return id!==mId;});saveState();openLinkDetail(linkId);}
function linkEQToTTLink(eqId,linkId){if(IS_READONLY)return;var found=findLink(linkId);if(!found||found.type!=='this_then')return;var l=found.link;ensureTTLinkMEQFields(l);if(!l.evalQuestions.includes(eqId))l.evalQuestions.push(eqId);saveState();openLinkDetail(linkId);}
function unlinkEQFromTTLink(eqId,linkId){if(IS_READONLY)return;var found=findLink(linkId);if(!found||found.type!=='this_then')return;var l=found.link;if(!l.evalQuestions)return;l.evalQuestions=l.evalQuestions.filter(function(id){return id!==eqId;});saveState();openLinkDetail(linkId);}
function addMeasureFromLinkPicker(linkId){var sel=document.getElementById('linkMPicker');if(!sel||!sel.value)return;linkMeasureToTTLink(sel.value,linkId);}
function addEQFromLinkPicker(linkId){var sel=document.getElementById('linkEQPicker');if(!sel||!sel.value)return;linkEQToTTLink(sel.value,linkId);}
function createNewMeasureForLink(linkId){if(IS_READONLY)return;var found=findLink(linkId);if(!found||found.type!=='this_then')return;var id='M'+String(measureNextId).padStart(3,'0');measureNextId++;var m={id:id,title:'New measure',mainText:'',notes1:'',notes2:'',notes3:'',trafficLight:'',tagIds:[],uid:_genUid('measure')};measures.push(m);var l=found.link;ensureTTLinkMEQFields(l);if(!l.measures.includes(id))l.measures.push(id);saveState();closeModal('linkDetailModal');render();setTimeout(function(){openMeasureDetail(id);},0);}
function createNewEQForLink(linkId){if(IS_READONLY)return;var found=findLink(linkId);if(!found||found.type!=='this_then')return;var id='EQ'+String(eqNextId).padStart(3,'0');eqNextId++;var q={id:id,questionText:'New evaluation question',mainText:'',notes1:'',notes2:'',notes3:'',trafficLight:'',tagIds:[],uid:_genUid('eq')};evalQuestions.push(q);var l=found.link;ensureTTLinkMEQFields(l);if(!l.evalQuestions.includes(id))l.evalQuestions.push(id);saveState();closeModal('linkDetailModal');render();setTimeout(function(){openEQDetail(id);},0);}
function getTTLinksLinkedToMeasure(mId){return ttLinks.filter(function(l){return l.measures&&l.measures.includes(mId);});}
function getTTLinksLinkedToEQ(eqId){return ttLinks.filter(function(l){return l.evalQuestions&&l.evalQuestions.includes(eqId);});}
function saveLinkDetail(){if(IS_READONLY){closeModal('linkDetailModal');return;}var linkId=document.getElementById('linkDetailModal').dataset.linkId;var found=findLink(linkId);if(!found){closeModal('linkDetailModal');return;}var l=found.link;var mainEl=document.getElementById('linkDMainText');if(mainEl)l.mainText=mainEl.value||'';if(found.type==='this_then'){var pol=document.getElementById('linkDPolarity');l.polarity=(pol&&pol.value==='negative')?'negative':'positive';l.light=normalizeTrafficLightValue(l.light);}l.notes1=(document.getElementById('linkDN1')||{}).value||'';l.notes2=(document.getElementById('linkDN2')||{}).value||'';l.notes3=(document.getElementById('linkDN3')||{}).value||'';saveState();closeModal('linkDetailModal');render();}
function toggleLinksListTags(){var cb=document.getElementById('linksShowTags');registryShowTags.links=!!(cb&&cb.checked);openLinksRegistry();}

    function markStart(e){startedOnBackdrop=(e.target===el);}
    el.addEventListener('pointerdown',markStart,true);
    el.addEventListener('mousedown',markStart,true);
    el.addEventListener('click',function(e){if(e.target===el&&startedOnBackdrop){closeFn();}startedOnBackdrop=false;});
  }
  document.querySelectorAll('.modal-ov').forEach(m => { installBackdropDismiss(m,function(){m.classList.remove('open');}); });
  installBackdropDismiss(document.getElementById('pageTypeChooser'),closePageChooser);
  installBackdropDismiss(document.getElementById('howPageTypeChooser'),closeHowPageTypeChooser);

  // close on-box traffic-light/priority chooser when clicking anywhere outside it
  var boxChooserPointerStartedInside=false;
  function markBoxChooserPointerStart(e){boxChooserPointerStartedInside=!!(e.target.closest&&e.target.closest('.box-chooser'));}
  document.addEventListener('pointerdown',markBoxChooserPointerStart,true);
  document.addEventListener('mousedown',markBoxChooserPointerStart,true);
  document.addEventListener('click', function(e){ var inside=!!(e.target.closest&&e.target.closest('.box-chooser')); if(!inside && !e.target.closest('.tl-dot') && !e.target.closest('.pri-badge') && !boxChooserPointerStartedInside){ closeBoxChooser(); } boxChooserPointerStartedInside=false; }, true);

  // lightweight custom tooltip interceptor. Intercepts elements with a native title attribute on hover and instead shows a larger, more-readable .dv-tip after a short (~120ms) delay, so tooltips feel noticeably quicker. The native title is stashed in data-dv-orig-title while the custom tip is showing, so the browser does not double up with its own tooltip, and is restored on mouseout. Stable (no flicker), unobtrusive, and does not require any change to existing title attributes elsewhere in the engine \u2014 so tooltip wording stays source-of-truth in those attributes. Avoids containers like .ep-ta/textarea/input whose title already serves a form-field purpose.
  (function(){
    var tipEl=null, tipTimer=null, currentTarget=null;
    function ensureTip(){ if(tipEl)return tipEl; tipEl=document.createElement('div'); tipEl.className='dv-tip'; document.body.appendChild(tipEl); return tipEl; }
    function hideTip(){ clearTimeout(tipTimer); tipTimer=null; if(tipEl)tipEl.style.display='none'; if(currentTarget&&currentTarget.getAttribute('data-dv-orig-title')!==null){ try{ currentTarget.title=currentTarget.getAttribute('data-dv-orig-title'); }catch(_){ } currentTarget.removeAttribute('data-dv-orig-title'); } currentTarget=null; }
    window.__doviewHideTip=hideTip;
    function isLinkDisplayHoverTarget(el){var n=el&&el.closest?el.closest('.reveal-arrow-hover-out,.reveal-arrow-hover-in'):null;return !!(n&&n.querySelector&&n.querySelector('.link-hover-pop'));}
    document.addEventListener('mouseover', function(e){
      if(isLinkDisplayHoverTarget(e.target)){ hideTip(); return; }
      var t=e.target; var found=null;
      while(t&&t!==document.body&&t.nodeType===1){ if(t.title&&t.title.trim()){ found=t; break; } if(t.getAttribute&&t.getAttribute('data-dv-orig-title')){ found=t; break; } t=t.parentNode; }
      if(!found){ hideTip(); return; }
      if(isLinkDisplayHoverTarget(found)){ hideTip(); return; }
      if(currentTarget===found)return;
      hideTip();
      currentTarget=found;
      var origTitle=found.title||found.getAttribute('data-dv-orig-title')||'';
      if(found.title){ found.setAttribute('data-dv-orig-title', found.title); found.removeAttribute('title'); }
      clearTimeout(tipTimer);
      tipTimer=setTimeout(function(){
        if(currentTarget!==found)return;
        var tip=ensureTip();
        tip.textContent=origTitle;
        tip.style.display='block';
        var r=found.getBoundingClientRect();
        var tipR=tip.getBoundingClientRect();
        var left=r.left;
        var top=r.bottom+6;
        if(left+tipR.width>window.innerWidth-10)left=window.innerWidth-tipR.width-10;
        if(top+tipR.height>window.innerHeight-10)top=r.top-tipR.height-6;
        tip.style.left=Math.max(6,left)+'px';
        tip.style.top=Math.max(6,top)+'px';
      }, 120);
    }, true);
    document.addEventListener('mouseout', function(e){
      var to=e.relatedTarget; if(!currentTarget)return;
      if(to&&(to===currentTarget||(currentTarget.contains&&currentTarget.contains(to))))return;
      hideTip();
    }, true);
    window.addEventListener('blur', hideTip);
    document.addEventListener('scroll', hideTip, true);
  })();

  // Clear reveal mode when clicking empty space on the board
  document.getElementById('board').addEventListener('click', e => {
    if(!e.target.closest('.box') && !e.target.closest('.how-box') && !e.target.closest('.fo-box') && !e.target.closest('.tt-cnt') && !e.target.closest('.tt-cnt-empty') && !e.target.closest('.how-cnt-bottom') && !e.target.closest('.how-cnt-bottom-empty') && !e.target.closest('.why-cnt-top') && !e.target.closest('.why-cnt-top-empty') && !e.target.closest('.how-how-cnt-bottom') && !e.target.closest('.how-lateral-sq') && !e.target.closest('.tt-lateral-sq') && !e.target.closest('.src-ref-box')){if(revealBox||inspectHome||sourceRefBox){revealBox=null;revealType=null;inspectHome=null;inspectLinkedKeys=[];sourceRefBox=null;render();}}
  });
}

return { init };
})();

// Auto-init for downloaded/reloaded files: if EMBEDDED_STATE is populated, init on DOMContentLoaded
if (typeof document !== 'undefined') {
  document.addEventListener('DOMContentLoaded', function() {
    if (EMBEDDED_STATE) {
      DoView.init(EMBEDDED_STATE);
    } else {
      // If no EMBEDDED_STATE, wait briefly for a DoView.init() call from a body script
      setTimeout(function() {

          document.body.innerHTML = '<div style="max-width:600px;margin:60px auto;font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:20px">'
            + '<h2 style="color:#F5A623;margin-bottom:12px">DoView Board — No board data found</h2>'
            + '<p style="color:#64748b;font-size:14px;line-height:1.7">This file contains the DoView engine but no board configuration. '
            + 'It was probably assembled incorrectly.</p>'
            + '<p style="color:#64748b;font-size:14px;line-height:1.7;margin-top:12px"><strong>To fix this:</strong> go back to the AI chat and type <code style="background:#f1f5f9;padding:2px 6px;border-radius:4px">redraw doview</code> to rebuild the board.</p>'
            + '<p style="color:#94a3b8;font-size:11px;margin-top:20px">Technical detail: the &lt;body&gt; script should contain a DoView.init({...}) call with board data, but none was found.</p>'
            + '</div>';
        }
      }, 500);
    }
  });
}
